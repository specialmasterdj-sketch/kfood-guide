<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>김치마트 — 유통기한 관리</title>
<link rel="manifest" href="pwa-assets/manifest.webmanifest">
<meta name="theme-color" content="#1a5c3a">
<script src="./nav-sidebar.js?v=2" defer></script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getDatabase, ref, onValue, set, update, push, remove } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';
  const cfg = { apiKey:"AIzaSyDGZc-qPqtX6KxqxzC0n7iE0X_eOhLpqrM", authDomain:"kimchi-mart-order.firebaseapp.com", databaseURL:"https://kimchi-mart-order-default-rtdb.firebaseio.com", projectId:"kimchi-mart-order" };
  const app = initializeApp(cfg);
  const db = getDatabase(app);
  window.__fb = { db, ref, onValue, set, update, push, remove };
  window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',Arial,sans-serif;background:#f4f6f9;color:#1f2937;min-height:100vh;font-size:14px;padding-bottom:80px}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer}

/* === TOPBAR === */
.topbar{background:linear-gradient(135deg,#1a5c3a,#2e7d32);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:50}
.topbar h1{font-size:1.1em;font-weight:800;display:flex;align-items:center;gap:8px}
.topbar .home-btn{background:rgba(255,255,255,.18);border:0;color:#fff;width:34px;height:34px;border-radius:50%;font-size:1em;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.topbar .home-btn:hover{background:rgba(255,255,255,.28)}
.topbar .row{display:flex;align-items:center;gap:10px;margin-top:8px}
.topbar select{flex:1;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:8px;padding:8px 12px;font-size:.92em;font-weight:600;outline:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><polyline points='1,1 5,5 9,1' fill='none' stroke='white' stroke-width='1.5'/></svg>");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.topbar select option{background:#1a5c3a;color:#fff}
.topbar .lang-toggle{display:inline-flex;background:rgba(255,255,255,.15);border-radius:14px;padding:2px;gap:0}
.topbar .lang-toggle button{background:transparent;border:0;color:#fff;padding:4px 10px;border-radius:12px;font-size:.74em;font-weight:700;opacity:.7}
.topbar .lang-toggle button.active{background:#fff;color:#1a5c3a;opacity:1}
.topbar .bell{background:rgba(255,255,255,.15);border:0;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.1em;position:relative}
.topbar .bell .dot{position:absolute;top:6px;right:8px;background:#dc2626;color:#fff;font-size:.6em;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}

/* === PAGES === */
.page{display:none;padding:14px;max-width:600px;margin:0 auto}
.page.active{display:block}

/* === KPI CARDS === */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kpi-card{border-radius:14px;padding:14px 10px;text-align:center;color:#fff;position:relative;overflow:hidden}
.kpi-card.danger{background:linear-gradient(135deg,#fecaca,#fee2e2);color:#7f1d1d}
.kpi-card.warn{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#78350f}
.kpi-card.money{background:linear-gradient(135deg,#bbf7d0,#dcfce7);color:#14532d}
.kpi-card .lbl{font-size:.74em;font-weight:700;opacity:.85;margin-bottom:4px}
.kpi-card .val{font-size:1.9em;font-weight:900;line-height:1}
.kpi-card .unit{font-size:.7em;font-weight:700;opacity:.85;margin-top:3px}
.kpi-card .ic{position:absolute;bottom:6px;right:8px;font-size:1.4em;opacity:.5}

/* === GREETING === */
.greeting{background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.greeting .date{font-size:.8em;color:#6b7280;font-weight:600}
.greeting .hello{font-size:1.05em;font-weight:800;color:#1a5c3a;margin-top:2px}
.greeting .progress{margin-top:12px}
.greeting .progress .lbl{display:flex;justify-content:space-between;font-size:.82em;font-weight:700;color:#374151;margin-bottom:4px}
.greeting .progress .lbl b{color:#1a5c3a}
.greeting .progress .bar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden}
.greeting .progress .bar .f{height:100%;background:linear-gradient(90deg,#22c55e,#1a5c3a);transition:width .3s}

/* === BIG ACTION BUTTONS === */
.big-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.big-btn{background:#fff;border:0;border-radius:14px;padding:18px 18px;display:flex;align-items:center;gap:14px;text-align:left;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:.15s;font-family:inherit}
.big-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.big-btn.primary{background:linear-gradient(135deg,#1a5c3a,#2e7d32);color:#fff}
.big-btn .ic{font-size:1.6em;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(0,0,0,.06)}
.big-btn.primary .ic{background:rgba(255,255,255,.2)}
.big-btn .body{flex:1;min-width:0}
.big-btn .body b{display:block;font-size:1em;font-weight:800;margin-bottom:2px}
.big-btn .body .sub{font-size:.78em;opacity:.7;line-height:1.3}
.big-btn .arrow{font-size:1.2em;opacity:.6}

/* === ITEM LIST === */
.list-toolbar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{flex-shrink:0;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:6px 12px;font-size:.84em;font-weight:600;color:#6b7280;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.chip.active{background:#1a5c3a;color:#fff;border-color:#1a5c3a}
.chip .count{background:rgba(0,0,0,.1);border-radius:10px;padding:0 7px;font-size:.85em;font-weight:700}
.chip.active .count{background:rgba(255,255,255,.25)}

.search-bar{position:relative;margin-bottom:10px}
.search-bar input{width:100%;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px 12px 40px;font-size:.95em;background:#fff;outline:none}
.search-bar input:focus{border-color:#1a5c3a}
.search-bar::before{content:'🔎';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:.95em;opacity:.5}

.item{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative}
.item.danger{border-left:5px solid #dc2626;background:#fef2f2}
.item.warn{border-left:5px solid #f59e0b;background:#fffbeb}
.item.normal{border-left:5px solid #22c55e}
.item .thumb{width:48px;height:48px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:1.4em;flex-shrink:0;overflow:hidden;color:#9ca3af;font-weight:700;font-size:.78em;text-align:center;line-height:1.1;padding:2px}
.item .thumb img{width:100%;height:100%;object-fit:cover}
.item .info{flex:1;min-width:0}
.item .info .nm{font-weight:700;font-size:.95em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .info .meta{font-size:.78em;color:#6b7280;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item .dday{font-size:.72em;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.04em}
.item .dday.over{background:#dc2626;color:#fff}
.item .dday.d0{background:#dc2626;color:#fff}
.item .dday.d1{background:#f59e0b;color:#fff}
.item .dday.d3{background:#fbbf24;color:#7c2d12}
.item .dday.normal{background:#22c55e;color:#fff}
.item .actions{display:flex;gap:4px}
.item .actions button{background:#fff;border:1.5px solid #e5e7eb;border-radius:8px;padding:6px 8px;font-size:.78em;font-weight:700;color:#6b7280;cursor:pointer;display:flex;align-items:center;justify-content:center;min-width:36px;height:36px}
.item .actions button.normal{border-color:#22c55e;color:#16a34a}
.item .actions button.warn{border-color:#f59e0b;color:#d97706}
.item .actions button.danger{border-color:#dc2626;color:#dc2626}
.item .actions button.normal.active{background:#22c55e;color:#fff}
.item .actions button.warn.active{background:#f59e0b;color:#fff}
.item .actions button.danger.active{background:#dc2626;color:#fff}
.item .actions button.del{border-color:#d1d5db;color:#9ca3af;font-size:.72em}
.item .actions button.del:hover{border-color:#dc2626;color:#dc2626;background:#fef2f2}

.empty-state{text-align:center;padding:50px 20px;color:#9ca3af}
.empty-state .ic{font-size:3em;margin-bottom:8px;opacity:.4}
.empty-state .msg{font-size:.92em}

/* === FAB === */
.fab{position:fixed;bottom:80px;right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1a5c3a,#2e7d32);color:#fff;border:0;font-size:1.6em;box-shadow:0 4px 14px rgba(26,92,58,.4);cursor:pointer;z-index:40}

/* === BOTTOM NAV === */
.botnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;display:flex;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:45}
@media (min-width: 761px){
  /* nav-sidebar.js 가 PC에서 좌측 200px 차지 — 하단바는 살짝 안쪽으로 들여 첫 버튼이 잘리지 않게 */
  .botnav{left:216px}
  .fab{right:24px}
}
.botnav button{background:transparent;border:0;flex:1;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;color:#9ca3af;font-size:.7em;font-weight:600;cursor:pointer}
.botnav button.active{color:#1a5c3a}
.botnav button .ic{font-size:1.3em}

/* === MODAL === */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow:auto;padding:18px;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{font-size:1.15em;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sheet .field{margin-bottom:14px}
.sheet .field label{display:block;font-size:.84em;font-weight:700;color:#374151;margin-bottom:5px}
.sheet .field input,.sheet .field select{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 14px;font-size:1em;outline:none}
.sheet .field input:focus,.sheet .field select:focus{border-color:#1a5c3a}
.sheet .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet .actions{display:flex;gap:8px;margin-top:6px}
.sheet .actions button{flex:1;padding:13px;border-radius:10px;font-size:1em;font-weight:700;cursor:pointer;border:0}
.sheet .actions .save{background:#1a5c3a;color:#fff}
.sheet .actions .cancel{background:#f3f4f6;color:#374151}
.scan-area{background:#000;border-radius:14px;height:200px;display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:12px;position:relative;overflow:hidden}
.scan-area .hint{font-size:.85em;opacity:.7}
.scan-area video{width:100%;height:100%;object-fit:cover}

/* === REPORT === */
.report-head{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px}
.report-head .total{font-size:.78em;color:#6b7280;font-weight:600}
.report-head .total b{color:#dc2626;font-size:2em;display:block;font-weight:900;margin-top:2px}
.receive-head{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.receive-head .info{flex:1;min-width:0}
.receive-head .info .lbl{font-size:.78em;color:#6b7280;font-weight:600}
.receive-head .info b{color:#1a5c3a;font-size:1.6em;display:block;font-weight:900;margin-top:2px;line-height:1.1}
.receive-head .info .warn-line{font-size:.76em;color:#9ca3af;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.receive-head button{background:#1a5c3a;color:#fff;border:0;border-radius:12px;padding:12px 16px;font-size:.9em;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(26,92,58,.3);flex-shrink:0;white-space:nowrap}
.report-tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:14px}
.report-tabs button{flex:1;background:transparent;border:0;padding:8px;font-size:.85em;font-weight:700;color:#6b7280;border-radius:8px;cursor:pointer}
.report-tabs button.active{background:#fff;color:#1a5c3a;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.bar-chart{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px}
.bar-chart h4{font-size:.92em;font-weight:800;margin-bottom:10px}
.staff-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.staff-card .head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.staff-card .who{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.staff-card .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1a5c3a,#2e7d32);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.95em;flex-shrink:0}
.staff-card .nm{font-weight:800;font-size:.95em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.staff-card .total{font-size:1.6em;font-weight:900;color:#1a5c3a;line-height:1}
.staff-card .total-unit{font-size:.7em;font-weight:600;color:#9ca3af;margin-left:3px}
.staff-card .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.staff-card .stat{background:#f9fafb;border-radius:8px;padding:8px 6px;text-align:center}
.staff-card .stat .n{font-size:1.05em;font-weight:800}
.staff-card .stat .l{font-size:.66em;color:#6b7280;font-weight:600;margin-top:2px}
.staff-card .stat.normal .n{color:#16a34a}
.staff-card .stat.warn .n{color:#d97706}
.staff-card .stat.danger .n{color:#dc2626}
.staff-card .stat.add .n{color:#2563eb}
.staff-card .rank{position:absolute;top:8px;right:10px;font-size:.7em;color:#9ca3af;font-weight:700}
.staff-card.top-1{border:2px solid #fbbf24;background:linear-gradient(180deg,#fffbeb 0%,#fff 60%)}
.staff-card.top-1 .avatar{background:linear-gradient(135deg,#f59e0b,#d97706)}
.bar-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.bar-row .lbl{flex:0 0 90px;font-size:.82em;color:#374151;font-weight:600}
.bar-row .bar{flex:1;height:18px;background:#f3f4f6;border-radius:5px;overflow:hidden;position:relative}
.bar-row .bar .f{height:100%;background:linear-gradient(90deg,#fee2e2,#dc2626);border-radius:5px}
.bar-row .val{flex:0 0 70px;text-align:right;font-size:.82em;font-weight:700;color:#dc2626}

/* === TOAST === */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1a5c3a;color:#fff;padding:12px 20px;border-radius:24px;font-size:.92em;font-weight:600;z-index:300;box-shadow:0 4px 18px rgba(0,0,0,.18);display:none;max-width:90vw}
.toast.show{display:block;animation:slideUp .25s}
.toast.danger{background:#dc2626}
</style>
</head>
<body>

<div class="topbar">
  <h1>
    <button class="home-btn" onclick="goBack()" title="뒤로" aria-label="뒤로">←</button>
    <button class="home-btn" onclick="location.href='./hub.html'" title="HUB" aria-label="HUB">🏠</button>
    📅 <span id="pageTitle">유통기한 관리</span>
  </h1>
  <div class="row">
    <select id="branchSel" onchange="onBranchChange()"></select>
    <div class="lang-toggle">
      <button data-l="ko" onclick="setLang('ko')">KO</button>
      <button data-l="en" onclick="setLang('en')">EN</button>
      <button data-l="es" onclick="setLang('es')">ES</button>
    </div>
    <button class="bell" onclick="switchPage('list')">🔔<span class="dot" id="alertDot" style="display:none">0</span></button>
  </div>
</div>

<!-- ============= HOME ============= -->
<div class="page active" id="page-home">
  <div class="greeting">
    <div class="date" id="todayDate"></div>
    <div class="hello" id="helloUser">안녕하세요</div>
    <div class="progress">
      <div class="lbl"><span id="progressLbl">오늘 체크 진행률</span><b id="progressNum">0%</b></div>
      <div class="bar"><div class="f" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card danger" onclick="filterAndGo('over')">
      <div class="lbl" id="kpiTodayLbl">🔴 오늘 폐기</div>
      <div class="val" id="kpiToday">0</div>
      <div class="unit" id="kpiUnit1">개</div>
      <div class="ic">🗑</div>
    </div>
    <div class="kpi-card warn" onclick="filterAndGo('d3')">
      <div class="lbl" id="kpiD3Lbl">🟡 D-3 상품</div>
      <div class="val" id="kpiD3">0</div>
      <div class="unit" id="kpiUnit2">개</div>
      <div class="ic">⏰</div>
    </div>
    <div class="kpi-card money" onclick="switchPage('report')">
      <div class="lbl" id="kpiLossLbl">💸 손실 예상</div>
      <div class="val" id="kpiLoss" style="font-size:1.5em">$0</div>
      <div class="ic">💵</div>
    </div>
  </div>

  <div class="big-actions">
    <button class="big-btn primary" onclick="switchPage('check')">
      <div class="ic">📋</div>
      <div class="body"><b id="btnCheck">오늘 체크 시작</b><span class="sub" id="btnCheckSub">유통기한 상품 확인하기</span></div>
      <div class="arrow">›</div>
    </button>
    <button class="big-btn" onclick="openAddSheet()">
      <div class="ic">➕</div>
      <div class="body"><b id="btnAdd">상품 등록</b><span class="sub" id="btnAddSub">새로운 상품 추가하기</span></div>
      <div class="arrow">›</div>
    </button>
    <button class="big-btn" onclick="switchPage('list')">
      <div class="ic">🔔</div>
      <div class="body"><b id="btnList">폐기/임박 리스트</b><span class="sub" id="btnListSub">유통기한 임박 상품 보기</span></div>
      <div class="arrow">›</div>
    </button>
  </div>
</div>

<!-- ============= CHECK (유통기한 체크) ============= -->
<div class="page" id="page-check">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="상품명으로 검색…" oninput="renderCheckList()">
  </div>
  <div class="list-toolbar" id="checkChips"></div>
  <div id="checkList"></div>
</div>

<!-- ============= LIST (폐기/임박) ============= -->
<div class="page" id="page-list">
  <div class="report-head">
    <div class="total" id="totalLossLbl">오늘 폐기 손실 예상 금액</div>
    <b id="totalLossVal">$0</b>
  </div>
  <div class="list-toolbar" id="listChips"></div>
  <div id="alertList"></div>
</div>

<!-- ============= REPORT ============= -->
<div class="page" id="page-report">
  <div class="report-head">
    <div class="total" id="reportTotalLbl">총 손실 금액</div>
    <b id="reportTotalVal">$0</b>
  </div>
  <div class="report-tabs" id="reportTabs">
    <button class="active" data-r="day" onclick="setReportRange('day',this)">일간</button>
    <button data-r="week" onclick="setReportRange('week',this)">주간</button>
    <button data-r="month" onclick="setReportRange('month',this)">월간</button>
  </div>
  <div class="bar-chart">
    <h4 id="reportByCatTitle">카테고리별 손실</h4>
    <div id="reportByCat"></div>
  </div>
  <div class="bar-chart">
    <h4 id="reportTopTitle">상품 TOP 10 손실</h4>
    <div id="reportTop"></div>
  </div>
</div>

<!-- ============= RECEIVE (입고 체크) ============= -->
<div class="page" id="page-receive">
  <div class="receive-head">
    <div class="info">

function t(key,vars){
  const o = I18N[key]; if(!o) return key;
  let s = o[LANG] || o.ko;
  if (vars) for (const k in vars) s = s.replace('{'+k+'}', vars[k]);
  return s;
}
function detectLang(){
  for (const k of ['tasks.lang','kimchi_lang','hub.lang']) {
    const v = localStorage.getItem(k);
    if (v && ['ko','en','es'].includes(v)) return v;
  }
  const nav = (navigator.language || 'ko').slice(0,2).toLowerCase();
  return ['ko','en','es'].includes(nav) ? nav : 'ko';
}

function $(id){ return document.getElementById(id); }
function escHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayKey(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtDate(d){
  const localeMap = { ko:'ko-KR', en:'en-US', es:'es-ES' };
  return new Date(d).toLocaleDateString(localeMap[LANG]||'ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}
function dayDiff(expiry){
  const t = new Date(); t.setHours(0,0,0,0);
  const e = new Date(expiry); e.setHours(0,0,0,0);
  return Math.round((e - t) / (1000*60*60*24));
}
function ddayKind(d){
  if (d < 0 || d === 0) return 'd0';
  if (d <= SETTINGS.danger) return 'd1';
  if (d <= SETTINGS.warn) return 'd3';
  return 'normal';
}
function ddayLabel(d){
  if (d < 0) return 'OVER';
  if (d === 0) return 'D-0';
  return 'D-' + d;
}
function showToast(msg, danger){
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast' + (danger?' danger':'') + ' show';
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=> el.classList.remove('show'), 2400);
}

function setLang(l){

  applyLang();
  window.dispatchEvent(new CustomEvent('km-lang-changed',{detail:l}));
}

// ============== Lookup from POS products ==============
// pos-cost-filter pushes the branch's POS catalog to products/{BRANCH}.rows;
// we read it once per branch and look up by FULL_BARCODE / CODE so scanning
// a barcode auto-fills name + category + price during 상품 등록.
const __LOOKUP_CACHE = {};
async function loadBranchLookup(branch){
  if (__LOOKUP_CACHE[branch]) return __LOOKUP_CACHE[branch];
  try {
    const r = await fetch(`${FB_DB_URL}/products/${branch}.json`);
    const d = await r.json();
    if (!d || !Array.isArray(d.rows)) { __LOOKUP_CACHE[branch] = {}; return {}; }
    // Build a multi-key index: each row registered under FULL_BARCODE, CODE,
    // and digit-only variants so EAN-13 (13 chars from camera) matches POS
    // catalogs that store the 12-char no-checkdigit form (and vice versa).
    const idx = {};
    function addKey(k, row){ if (k && !idx[k]) idx[k] = row; }
    d.rows.forEach(row => {
      const raw = [row.FULL_BARCODE, row.CODE, row.PID].map(v => v ? String(v).trim() : '');
      raw.forEach(k => {
        if (!k) return;
        addKey(k, row);
        const digits = k.replace(/\D/g, '');
        if (digits) {
          addKey(digits, row);
          addKey(digits.replace(/^0+/, '') || digits, row);
        }
      });
    });
    __LOOKUP_CACHE[branch] = idx;
    return idx;
  } catch(e) { __LOOKUP_CACHE[branch] = {}; return {}; }
}
// Match a scanned/typed barcode against the lookup index by trying every
// realistic variant: pad to common lengths (8/11/12/13), strip leading
// zeros, drop the last (check) digit, and the same with the check digit
// removed. Same logic lookup.html uses.
function lookupBarcodeVariants(idx, query){
  const q = String(query || '').trim();
  if (!q) return null;
  const variants = new Set();
  variants.add(q);
  const qDigits = q.replace(/\D/g, '');
  if (qDigits) {
    variants.add(qDigits);
    variants.add(qDigits.replace(/^0+/, '') || qDigits);
    for (const len of [8, 11, 12, 13]) {
      if (qDigits.length <= len) variants.add(qDigits.padStart(len, '0'));
    }
    // last digit dropped (POS catalog without check digit)
    if (qDigits.length > 1) {
      const noCheck = qDigits.slice(0, -1);
      variants.add(noCheck);
      variants.add(noCheck.replace(/^0+/, '') || noCheck);
      for (const len of [8, 11, 12]) {
        if (noCheck.length <= len) variants.add(noCheck.padStart(len, '0'));
      }
    }
  }
  for (const v of variants) {
    if (idx[v]) return idx[v];
  }
  return null;
}
function mapPosCategory(posCat){
  // Map free-form POS categories to our 9 buckets.
  // Order matters — most specific labels first so 'CANNED FISH' goes to 캔류
  // (not 냉장 via FISH) and 'FROZEN MEAT' goes to 냉동 (not 냉장 via MEAT).
  const c = (posCat || '').toUpperCase();
  if (/FROZEN|FRZN|\(FRZN\)/.test(c))                                                  return '냉동';
  if (/CANNED|CAN\b|TUNA|SARDINE/.test(c))                                              return '캔류';
  if (/NOODLE|RAMEN|RAMYUN|UDON|PASTA|VERMICELL/.test(c))                              return '라면(누들)';
  if (/SAUCE|PASTE|MARINADE|DRESSING|SOY|SOJU|VINEGAR|GOCHUJANG|DOENJANG/.test(c))     return '소스';
  if (/SNACK|CANDY|COOKIE|CHOCOLATE|BISCUIT|CHIP|CRACKER|GUM|JELLY|봉지/.test(c))        return '스넥(캔디)';
  if (/DRINK|BEVERAGE|JUICE|SODA|WATER|COFFEE|TEA|MILK TEA/.test(c))                    return '음료수';
  if (/REFRIGERAT|REFRIG|MILK|YOGURT|CHEESE|DAIRY|DELI|MEAT|FISH|SEAFOOD|BEEF|PORK|CHICKEN|TOFU|BANCHAN|반찬|KIMBAP|RICE CAKE/.test(c)) return '냉장';
  if (/RICE|GRAIN|FLOUR|OIL|SPICE|SUGAR|SALT|SEASONING|DRY|DRIED|GROCERY|SEAWEED|NORI|SESAME/.test(c)) return '드라이제품';
  return '기타';
}
async function autofillFromBarcode(){
  const code = ($('addBarcode').value || '').trim();
  if (!code) return;
  const idx = await loadBranchLookup(BRANCH);
  const hit = lookupBarcodeVariants(idx, code);
  if (!hit) {
    showToast('🔍 POS 카탈로그에 없는 바코드 — 직접 입력하세요', true);
    return;
  }
  // Only overwrite empty fields so a manager can keep their custom name if they typed one
  if (!$('addName').value.trim()) $('addName').value = hit.NAME || '';
  if (!parseFloat($('addPrice').value)) {
    const p = hit.PRICE || 0;
    if (p) $('addPrice').value = p;
  }
  if (!parseFloat($('addCost').value)) {
    const c2 = hit.COST || 0;
    if (c2) $('addCost').value = c2;
  }
  $('addCat').value = mapPosCategory(hit.CATEGORY);
  syncCatChip();
  showToast('✅ ' + (hit.NAME || code) + ' (POS 자동 채움)');
}
window.autofillFromBarcode = autofillFromBarcode;
// Strip the trailing check digit so what we store matches the POS catalog
// format. EAN-13 → 12, EAN-8 stays 8 (we keep short codes intact).
function normalizeBarcodeForStorage(raw){
  const d = String(raw||'').replace(/\D/g, '');
  if (d.length >= 13) return d.slice(0, -1);    // drop check digit on EAN-13/UPC-A check
  if (d.length === 12) return d;                 // already POS-form
  return d;                                      // shorter codes kept
}
window.normalizeBarcodeForStorage = normalizeBarcodeForStorage;

async function compressImg(file, maxSide=1024, quality=0.8){
  if (!file || !file.type.startsWith('image/')) return file;
  try {
    const url = URL.createObjectURL(file);
    const img = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=url; });
    URL.revokeObjectURL(url);
    let { width, height } = img;
    if (width <= maxSide && height <= maxSide && file.size < 300*1024) return file;
    const r = Math.min(maxSide/width, maxSide/height, 1);
    const w = Math.round(width*r), h = Math.round(height*r);
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    return await new Promise(res => c.toBlob(b => res(b||file), 'image/jpeg', quality));
  } catch(e){ return file; }
}
async function onAddPhotoPick(ev){
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const compressed = await compressImg(file);
  const reader = new FileReader();

    __ADD_PHOTO_DATA = { blob: compressed, dataUrl: reader.result };
    const prev = $('addPhotoPreview');
    prev.innerHTML = `<img src="${reader.result}" style="width:100%;height:100%;object-fit:cover">`;
    prev.style.background = 'transparent';
  };
  reader.readAsDataURL(compressed);
}

  return __ADD_PHOTO_DATA.dataUrl;
}
// Camera barcode scanning — uses native BarcodeDetector when available
// (Chrome/Edge Android), falls back to ZXing for everything else (iOS Safari).
async function scanBarcode(){
  let modal = document.getElementById('__bcModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = '__bcModal';
    modal.style.cssText = 'position:fixed;inset:0;background:#000;z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px';
    modal.innerHTML = `
      <video id="__bcVideo" style="width:100%;max-width:480px;max-height:60vh;border-radius:14px;object-fit:cover" autoplay playsinline muted></video>
      <div style="color:#fff;margin-top:20px;font-size:1em;font-weight:600;text-align:center">바코드를 화면 가운데에 맞추세요</div>
      <div id="__bcStatus" style="color:#22c55e;margin-top:8px;font-size:.9em;font-weight:600">📡 인식 중…</div>
      <button onclick="closeBcModal()" style="margin-top:18px;background:#fff;color:#1a5c3a;border:0;border-radius:24px;padding:10px 28px;font-weight:700;font-size:.95em;cursor:pointer">취소</button>
    `;
    document.body.appendChild(modal);
  }
  modal.style.display = 'flex';
  const video = document.getElementById('__bcVideo');
  const statusEl = document.getElementById('__bcStatus');

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    statusEl.textContent = '⚠️ 카메라 접근 실패: ' + (e.message || '');
    setTimeout(closeBcModal, 1500);
    return;
  }

  __bcActive = true;
  // Path 1: native BarcodeDetector (fast, no library)
  if ('BarcodeDetector' in window) {
    let detector;
    try {
      detector = new window.BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','upc_a','upc_e','qr_code'] });
    } catch(e) { detector = new window.BarcodeDetector(); }
    statusEl.textContent = '📡 인식 중… (Native)';
    const tick = async () => {
      if (!__bcActive) return;
      try {
        const codes = await detector.detect(video);
        if (codes && codes.length) {
          const norm = normalizeBarcodeForStorage(codes[0].rawValue);
          $('addBarcode').value = norm;
          showToast('🏷 ' + norm);
          closeBcModal();
          autofillFromBarcode();
          return;
        }
      } catch(e) {}
      setTimeout(tick, 250);
    };
    tick();
    return;
  }

  // Path 2: ZXing fallback (covers iOS Safari + older browsers)
  statusEl.textContent = '📥 인식기 로딩 중…';
  try {
    if (!window.ZXing) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const reader = new window.ZXing.BrowserMultiFormatReader();
    statusEl.textContent = '📡 인식 중… (ZXing)';
    __bcReader = reader;
    reader.decodeFromVideoElementContinuously(video, (result) => {
      if (result && __bcActive) {
        const norm = normalizeBarcodeForStorage(result.text);
        $('addBarcode').value = norm;
        showToast('🏷 ' + norm);
        closeBcModal();
        autofillFromBarcode();
      }
    });
  } catch(e) {
    statusEl.textContent = '⚠️ 스캐너 로드 실패';
    setTimeout(closeBcModal, 1500);
  }
}

  localStorage.setItem('expiry.settings', JSON.stringify(SETTINGS));
  closeOv('settingsOv');
  renderAll();
  // Push to Firebase so other devices for the same branch pick it up
  try {
    if (window.__fb) {
      const sPath = 'expiry/' + BRANCH + '/settings';
      await window.__fb.set(window.__fb.ref(window.__fb.db, sPath), SETTINGS);
    }
  } catch (e) { console.warn('settings sync failed', e); }
  showToast(t('saved'));
}
function closeOv(id){ $(id).classList.remove('show'); }

// ============== Render ==============
function renderHome(){
  $('todayDate').textContent = fmtDate(new Date());
  // KPI label reflects current SETTINGS.warn (so it updates when settings sync from RTDB)
  $('kpiD3Lbl').textContent = t('kpiD3Lbl', { n: SETTINGS.warn });
  // KPI
  let over = 0, d3 = 0, lossEst = 0;
  PRODUCTS.forEach(p => {
    if (p.status === 'discarded') return;
    const d = dayDiff(p.expiry);
    if (d <= 0) { over += p.qty; lossEst += (p.cost || p.price || 0) * p.qty; }
    else if (d <= SETTINGS.warn) d3 += p.qty;
  });
  $('kpiToday').textContent = over;
  $('kpiD3').textContent = d3;
  $('kpiLoss').textContent = '$' + Math.round(lossEst);
  // Progress
  const checkedToday = PRODUCTS.filter(p => p.lastCheckedAt && new Date(p.lastCheckedAt).toDateString() === new Date().toDateString()).length;
  const total = PRODUCTS.filter(p => p.status !== 'discarded').length;
  const pct = total ? Math.round(checkedToday/total*100) : 0;
  $('progressNum').textContent = pct + '% (' + checkedToday + '/' + total + ')';
  $('progressFill').style.width = pct + '%';
  // Alert dot
  if (over > 0) { $('alertDot').textContent = over; $('alertDot').style.display = ''; }
  else $('alertDot').style.display = 'none';
}
function renderCheckList(){
  const chips = $('checkChips');
  const counts = { all: PRODUCTS.length, unchecked: 0, done: 0 };
  const todayStr = new Date().toDateString();
  PRODUCTS.forEach(p => {
    if (p.lastCheckedAt && new Date(p.lastCheckedAt).toDateString() === todayStr) counts.done++;
    else counts.unchecked++;
  });
  chips.innerHTML = `
    <button class="chip ${CHECK_FILTER==='unchecked'?'active':''}" onclick="setCheckFilter('unchecked')">${t('chipUnchecked')} <span class="count">${counts.unchecked}</span></button>
    <button class="chip ${CHECK_FILTER==='done'?'active':''}" onclick="setCheckFilter('done')">${t('chipDone')} <span class="count">${counts.done}</span></button>
    <button class="chip ${CHECK_FILTER==='all'?'active':''}" onclick="setCheckFilter('all')">${t('chipAll')} <span class="count">${counts.all}</span></button>`;
  const q = ($('searchInput').value || '').trim().toLowerCase();
  let rows = PRODUCTS.slice();
  if (CHECK_FILTER === 'unchecked') rows = rows.filter(p => !p.lastCheckedAt || new Date(p.lastCheckedAt).toDateString() !== todayStr);
  if (CHECK_FILTER === 'done') rows = rows.filter(p => p.lastCheckedAt && new Date(p.lastCheckedAt).toDateString() === todayStr);
  if (q) rows = rows.filter(p => (p.name||'').toLowerCase().includes(q) || (p.barcode||'').includes(q));
  // sort by D-Day asc
  rows.sort((a,b) => dayDiff(a.expiry) - dayDiff(b.expiry));
  const list = $('checkList');
  if (rows.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="ic">📋</div><div class="msg">${t('emptyList')}</div></div>`;
    return;
  }
  list.innerHTML = rows.map(p => {
    const d = dayDiff(p.expiry);
    const kind = ddayKind(d);
    const lbl = ddayLabel(d);
    const cls = kind==='d0'?'danger':(kind==='d1'?'warn':(kind==='d3'?'warn':'normal'));
    const initials = (p.name||'').slice(0,2).toUpperCase();
    const thumbContent = p.photo ? `<img src="${p.photo}">` : initials;
    const activeNorm = p.status==='active'?'active':'';
    const activeWarn = p.status==='discounted'?'active':'';
    const activeDanger = p.status==='discarded'?'active':'';
    return `<div class="item ${cls}">
      <div class="thumb" onclick="${p.photo?`openPhoto('${p.photo}')`:''}">${thumbContent}</div>
      <div class="info">
        <div class="nm">${escHtml(p.name)}</div>
        <div class="meta">
          <span class="dday ${kind}">${lbl}</span>
          <span>${escHtml(p.expiry||'')}</span>
          <span>${p.qty||1}${t('unitItem')}</span>
          ${p.barcode?`<span style="font-size:.7em;color:#9ca3af">🏷 ${escHtml(p.barcode)}</span>`:''}
        </div>
      </div>
      <div class="actions">
        <button class="normal ${activeNorm}" onclick="markStatus('${p.id}','normal')" title="정상">✅</button>
        <button class="warn ${activeWarn}" onclick="markStatus('${p.id}','warn')" title="할인 필요">⚠️</button>
        <button class="danger ${activeDanger}" onclick="markStatus('${p.id}','danger')" title="폐기">❌</button>
        <button class="del" onclick="deleteProduct('${p.id}', ${JSON.stringify(p.name||'').replace(/"/g,'&quot;')})" title="삭제">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function setCheckFilter(f){ CHECK_FILTER = f; renderCheckList(); }
window.setCheckFilter = setCheckFilter;

function renderAlertList(){
  const counts = { over:0, d1:0, d3:0 };
  PRODUCTS.forEach(p => {
    if (p.status === 'discarded') return;
    const d = dayDiff(p.expiry);
    if (d <= 0) counts.over++;
    else if (d <= SETTINGS.danger) counts.d1++;
    else if (d <= SETTINGS.warn) counts.d3++;
  });
  $('listChips').innerHTML = `
    <button class="chip ${LIST_FILTER==='over'?'active':''}" onclick="setListFilter('over')">${t('chipOver')} <span class="count">${counts.over}</span></button>
    <button class="chip ${LIST_FILTER==='d1'?'active':''}" onclick="setListFilter('d1')">${t('chipD1', { n: SETTINGS.danger })} <span class="count">${counts.d1}</span></button>
    <button class="chip ${LIST_FILTER==='d3'?'active':''}" onclick="setListFilter('d3')">${t('chipD3', { n: SETTINGS.warn })} <span class="count">${counts.d3}</span></button>
    <button class="chip ${LIST_FILTER==='all'?'active':''}" onclick="setListFilter('all')">${t('chipAll')} <span class="count">${counts.over+counts.d1+counts.d3}</span></button>`;
  let rows = PRODUCTS.filter(p => p.status !== 'discarded');
  if (LIST_FILTER === 'over') rows = rows.filter(p => dayDiff(p.expiry) <= 0);
  else if (LIST_FILTER === 'd1') rows = rows.filter(p => { const d=dayDiff(p.expiry); return d>0 && d<=SETTINGS.danger; });
  else if (LIST_FILTER === 'd3') rows = rows.filter(p => { const d=dayDiff(p.expiry); return d>SETTINGS.danger && d<=SETTINGS.warn; });
  else rows = rows.filter(p => dayDiff(p.expiry) <= SETTINGS.warn);
  rows.sort((a,b) => dayDiff(a.expiry) - dayDiff(b.expiry));
  let total = 0;
  rows.forEach(p => total += (p.cost || p.price || 0) * (p.qty||1));
  $('totalLossVal').textContent = '$' + Math.round(total);
  const list = $('alertList');
  if (rows.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="ic">✅</div><div class="msg">No items</div></div>`;
    return;
  }
  list.innerHTML = rows.map(p => {
    const d = dayDiff(p.expiry);
    const kind = ddayKind(d);
    const lbl = ddayLabel(d);
    const cls = kind==='d0'?'danger':'warn';
    const lossOne = (p.cost || p.price || 0) * (p.qty||1);
    return `<div class="item ${cls}">
      <div class="thumb">${(p.name||'').slice(0,2).toUpperCase()}</div>
      <div class="info">
        <div class="nm">${escHtml(p.name)}</div>
        <div class="meta">
          <span class="dday ${kind}">${lbl}</span>
          <span>${p.qty||1}${t('unitItem')}</span>
          <span style="color:#dc2626;font-weight:700">$${lossOne.toFixed(0)}</span>
        </div>
      </div>
      <div class="actions">
        <button class="danger" onclick="markStatus('${p.id}','danger')" title="폐기">❌</button>
        <button class="del" onclick="deleteProduct('${p.id}', ${JSON.stringify(p.name||'').replace(/"/g,'&quot;')})" title="삭제">🗑</button>
      </div>
    </div>`;
  }).join('');
}
function setListFilter(f){ LIST_FILTER = f; renderAlertList(); }
window.setListFilter = setListFilter;

function renderReport(){
  const now = new Date();
  let from;
  if (REPORT_RANGE === 'day') { from = new Date(now); from.setHours(0,0,0,0); }
  else if (REPORT_RANGE === 'week') { from = new Date(now); from.setDate(now.getDate()-7); }
  else { from = new Date(now); from.setMonth(now.getMonth()-1); }
  const fromMs = from.getTime();
  const discarded = PRODUCTS.filter(p => p.status === 'discarded' && p.discardedAt && p.discardedAt >= fromMs);
  const total = discarded.reduce((s,p) => s + (p.cost || p.price || 0)*(p.qty||1), 0);
  $('reportTotalVal').textContent = '$' + Math.round(total);
  // Category breakdown
  const byCat = {};
  discarded.forEach(p => {
    const c = p.category || '기타';
    byCat[c] = (byCat[c] || 0) + (p.cost || p.price || 0)*(p.qty||1);
  });
  const catRows = Object.entries(byCat).sort((a,b) => b[1] - a[1]);
  const max = catRows.length ? catRows[0][1] : 1;
  $('reportByCat').innerHTML = catRows.length === 0
    ? `<div style="color:#9ca3af;font-size:.85em;text-align:center;padding:14px">데이터 없음</div>`
    : catRows.map(([c, v]) => `<div class="bar-row"><div class="lbl">${escHtml(c)}</div><div class="bar"><div class="f" style="width:${v/max*100}%"></div></div><div class="val">$${Math.round(v)}</div></div>`).join('');
  // TOP 10
  const byProd = {};
  discarded.forEach(p => {
    byProd[p.name] = (byProd[p.name] || 0) + (p.cost || p.price || 0)*(p.qty||1);
  });
  const topRows = Object.entries(byProd).sort((a,b) => b[1] - a[1]).slice(0,10);
  const maxP = topRows.length ? topRows[0][1] : 1;
  $('reportTop').innerHTML = topRows.length === 0
    ? `<div style="color:#9ca3af;font-size:.85em;text-align:center;padding:14px">데이터 없음</div>`
    : topRows.map(([n, v]) => `<div class="bar-row"><div class="lbl">${escHtml(n).slice(0,12)}</div><div class="bar"><div class="f" style="width:${v/maxP*100}%"></div></div><div class="val">$${Math.round(v)}</div></div>`).join('');
}
function setReportRange(r, btn){
  REPORT_RANGE = r;
  document.querySelectorAll('#reportTabs button').forEach(b => b.classList.remove('active'));
  btn && btn.classList.add('active');
  renderReport();
}
window.setReportRange = setReportRange;

function renderAll(){
  renderHome();
  if (PAGE === 'check') renderCheckList();
  else if (PAGE === 'list') renderAlertList();
  else if (PAGE === 'report') renderReport();
  else if (PAGE === 'receive') renderReceive();
  else if (PAGE === 'staff') renderStaff();
}
function setStaffRange(r, btn){
  STAFF_RANGE = r;
  document.querySelectorAll('#staffTabs button').forEach(b => b.classList.toggle('active', b === btn));
  renderStaff();
}
window.setStaffRange = setStaffRange;
function rangeStartMs(range){
  const now = new Date();
  if (range === 'day') { const d = new Date(now); d.setHours(0,0,0,0); return d.getTime(); }
  if (range === 'week') { const d = new Date(now); d.setDate(now.getDate()-7); return d.getTime(); }
  const d = new Date(now); d.setMonth(now.getMonth()-1); return d.getTime();
}
function renderStaff(){
  const fromMs = rangeStartMs(STAFF_RANGE);
  // Aggregate per-person stats
  const byPerson = {}; // name → { total, normal, warn, danger, added }
  function bucket(name){
    if (!name) name = '미등록';
    if (!byPerson[name]) byPerson[name] = { name, total:0, normal:0, warn:0, danger:0, added:0 };
    return byPerson[name];
  }
  PRODUCTS.forEach(p => {
    if (p.lastCheckedAt && p.lastCheckedAt >= fromMs) {
      const b = bucket(p.lastCheckedBy);
      b.total++;
      if (p.status === 'discounted') b.warn++;
      else if (p.status === 'discarded') b.danger++;
      else b.normal++;
    }
    if (p.addedAt && p.addedAt >= fromMs) {
      bucket(p.addedBy).added++;
    }
  });
  const rows = Object.values(byPerson).sort((a,b) => (b.total + b.added) - (a.total + a.added));

  // Overall progress
  let totalChecked = 0, totalProducts = 0;
  const todayStr = new Date().toDateString();
  if (STAFF_RANGE === 'day') {
    PRODUCTS.forEach(p => {
      if (p.status === 'discarded') return;
      totalProducts++;
      if (p.lastCheckedAt && new Date(p.lastCheckedAt).toDateString() === todayStr) totalChecked++;
    });
  } else {
    PRODUCTS.forEach(p => {
      totalProducts++;
      if (p.lastCheckedAt && p.lastCheckedAt >= fromMs) totalChecked++;
    });
  }
  const pct = totalProducts ? Math.round(totalChecked/totalProducts*100) : 0;
  $('staffOverallVal').textContent = pct + '%';
  $('staffOverallSub').textContent = t('staffOverallSub', { n: totalChecked, m: totalProducts });

  const list = $('staffList');
  if (rows.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="ic">👥</div><div class="msg">${t('staffEmpty')}</div></div>`;
    return;
  }
  list.innerHTML = rows.map((s, i) => {
    const initials = (s.name||'?').slice(0,2).toUpperCase();
    const totalActs = s.total + s.added;
    const topCls = i === 0 && totalActs > 0 ? ' top-1' : '';
    return `<div class="staff-card${topCls}" style="position:relative">
      ${i < 3 && totalActs > 0 ? `<div class="rank">#${i+1}</div>` : ''}
      <div class="head">
        <div class="who">
          <div class="avatar">${escHtml(initials)}</div>
          <div style="flex:1;min-width:0">
            <div class="nm">${escHtml(s.name)}</div>
            <div style="font-size:.72em;color:#9ca3af;margin-top:2px">${totalActs}${t('staffUnit')}</div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <span class="total">${s.total}</span><span class="total-unit">${t('staffStatChecks')}</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat normal"><div class="n">${s.normal}</div><div class="l">${t('staffStatNormal')}</div></div>
        <div class="stat warn"><div class="n">${s.warn}</div><div class="l">${t('staffStatWarn')}</div></div>
        <div class="stat danger"><div class="n">${s.danger}</div><div class="l">${t('staffStatDanger')}</div></div>
        <div class="stat add"><div class="n">${s.added}</div><div class="l">${t('staffStatAdd')}</div></div>
      </div>
    </div>`;
  }).join('');
}
function renderReceive(){
  const todayStr = new Date().toDateString();
  const todays = PRODUCTS.filter(p => {
    const t = p.receivedAt || p.addedAt;
    return t && new Date(t).toDateString() === todayStr;
  }).sort((a,b) => (b.receivedAt||b.addedAt||0) - (a.receivedAt||a.addedAt||0));
  let warnCount = 0;
  todays.forEach(p => { if (dayDiff(p.expiry) <= SETTINGS.warn) warnCount += (p.qty||1); });
  $('receiveCountVal').textContent = todays.reduce((s,p) => s+(p.qty||1),0) + t('receiveCountUnit');
  $('receiveWarnVal').textContent = warnCount;
  $('receiveWarnSuffix').textContent = t('receiveWarnSuffix');
  const list = $('receiveList');
  if (todays.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="ic">📦</div><div class="msg">${t('emptyReceive')}</div></div>`;
    return;
  }
  list.innerHTML = todays.map(p => {
    const d = dayDiff(p.expiry);
    const kind = ddayKind(d);
    const lbl = ddayLabel(d);
    const cls = kind==='d0'?'danger':(kind==='d1'?'warn':(kind==='d3'?'warn':'normal'));
    const initials = (p.name||'').slice(0,2).toUpperCase();
    const thumbContent = p.photo ? `<img src="${p.photo}">` : initials;
    const ts = new Date(p.receivedAt || p.addedAt);
    const timeStr = ts.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    return `<div class="item ${cls}">
      <div class="thumb" onclick="${p.photo?`openPhoto('${p.photo}')`:''}">${thumbContent}</div>
      <div class="info">
        <div class="nm">${escHtml(p.name)}</div>
        <div class="meta">
          <span class="dday ${kind}">${lbl}</span>
          <span>${escHtml(p.expiry||'')}</span>
          <span>${p.qty||1}${t('unitItem')}</span>
          <span style="font-size:.7em;color:#9ca3af">⏱ ${timeStr}</span>
          ${p.receivedBy?`<span style="font-size:.7em;color:#9ca3af">${escHtml(t('receiveBy', { n: p.receivedBy }))}</span>`:''}
        </div>
      </div>
      <div class="actions">
        <button class="del" onclick="deleteProduct('${p.id}', ${JSON.stringify(p.name||'').replace(/"/g,'&quot;')})" title="삭제">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ============== Page nav ==============
function switchPage(p){
  PAGE = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  $('page-' + p).classList.add('active');
  document.querySelectorAll('.botnav button').forEach(b => b.classList.toggle('active', b.dataset.p === p));
  window.scrollTo({top:0,behavior:'smooth'});
  renderAll();
}
window.switchPage = switchPage;
// Back: 홈이 아니면 홈으로, 홈이면 HUB로
function goBack(){
  if (PAGE !== 'home') { switchPage('home'); return; }
  if (history.length > 1 && document.referrer && document.referrer !== location.href) { history.back(); return; }
  location.href = './hub.html';
}
window.goBack = goBack;
window.openAddSheet = openAddSheet;
window.saveProduct = saveProduct;
window.markStatus = markStatus;
window.openSettingsSheet = openSettingsSheet;
async function forceRefresh(){
  const msg = (LANG==='en')?'Clear all cached files and reload? (You will get the latest version.)'
            : (LANG==='es')?'¿Borrar caché y recargar? (Obtendrá la última versión.)'
            : '캐시를 모두 지우고 새로고침할까요? (최신 버전으로 동기화됩니다)';
  if (!confirm(msg)) return;
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
  } catch(e){ console.warn(e); }
  location.reload();
}
window.forceRefresh = forceRefresh;
window.saveSettings = saveSettings;
window.closeOv = closeOv;
window.onBranchChange = onBranchChange;
window.setLang = setLang;
function filterAndGo(f){ LIST_FILTER = f; switchPage('list'); }
window.filterAndGo = filterAndGo;

// ============== Init ==============
renderBranches();
applyLang();
renderAll();

// Service worker for PWA / offline
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
