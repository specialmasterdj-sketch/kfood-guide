<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POS COST Filter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh}
.hdr{background:linear-gradient(135deg,#2e8b57,#1f6a41);color:#fff;padding:20px;text-align:center;position:relative}
.hdr h1{font-size:22px;margin-bottom:4px}
.hdr p{font-size:13px;opacity:.9}
.langbar{position:absolute;top:14px;right:14px;display:flex;gap:4px}
.langbar button{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:14px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700}
.langbar button.active{background:#fff;color:#1f6a41}
.pg{max-width:760px;margin:0 auto;padding:18px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:14px}
.ct{font-size:16px;font-weight:700;margin-bottom:10px;color:#2e8b57}
.tip{background:#f0f8f4;border-left:4px solid #2e8b57;padding:10px 12px;border-radius:6px;font-size:13px;color:#2c5c3c;margin-bottom:10px;line-height:1.5}
.drop{border:2.5px dashed #bcd;border-radius:10px;padding:30px 12px;text-align:center;cursor:pointer;position:relative;background:#fafcfb;transition:.15s}
.drop:hover{border-color:#2e8b57;background:#f0f8f4}
.drop.over{border-color:#2e8b57;background:#e8f5e9}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop .ico{font-size:42px;margin-bottom:6px}
.drop .ut{font-size:15px;font-weight:600;color:#333;margin-bottom:4px}
.drop .uh{font-size:12px;color:#888}
.btn{padding:12px 18px;border:none;border-radius:9px;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px}
.btn-g{background:#2e8b57;color:#fff}
.btn-g:disabled{background:#ccc;cursor:not-allowed}
.btn-o{background:#fff;color:#2e8b57;border:1.5px solid #2e8b57}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.stat{background:#f5f8f6;border-radius:8px;padding:12px;text-align:center}
.stat .n{font-size:22px;font-weight:800;color:#2e8b57}
.stat .l{font-size:11px;color:#666;margin-top:2px}
.mapr{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.mapr label{min-width:110px;font-weight:600}
.mapr select{flex:1;padding:8px;border:1.5px solid #ccc;border-radius:6px;font-family:inherit;font-size:13px}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:22px;opacity:0;transition:.2s;z-index:999}
.toast.show{opacity:1}
.twrap{max-height:360px;overflow:auto;border:1px solid #e0e0e0;border-radius:8px;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#2e8b57;color:#fff;padding:8px;text-align:left;position:sticky;top:0;z-index:1}
td{padding:6px 8px;border-bottom:1px solid #f0f0f0}
tr:nth-child(even) td{background:#fafcfb}
.mono{font-family:monospace}
.num{text-align:right}
</style>
</head>
<body>

<div class="hdr">
  <h1 data-t="title">🧹 POS COST 필터</h1>
  <p data-t="subtitle">Vela POS 엑셀에서 COST가 있는 상품만 골라 새 엑셀로 저장</p>
  <div class="langbar">
    <button id="lb-ko" onclick="setLang('ko')">KO</button>
    <button id="lb-en" onclick="setLang('en')">EN</button>
    <button id="lb-es" onclick="setLang('es')">ES</button>
  </div>
</div>

<div class="pg">

  <div class="card">
    <div class="ct" data-t="branch_title">📍 지점 선택</div>
    <select id="branch-sel" onchange="setBranch(this.value)" style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff">
      <option value="" data-t="branch_placeholder">-- 지점 선택 --</option>
      <option value="MIAMI">마이애미 (Miami)</option>
      <option value="PEMBROKE_PINES">펨브로크 파인즈 (Pembroke Pines)</option>
      <option value="HOLLYWOOD">할리우드 (Hollywood)</option>
      <option value="CORAL_SPRINGS">코럴 스프링스 (Coral Springs)</option>
      <option value="LASOLAS">라스올라스 (LASOLAS)</option>
      <option value="WEST_PALM">웨스트 팜 비치 (West Palm Beach)</option>
    </select>
    <div id="branch-status" style="font-size:12px;color:#666;margin-top:6px"></div>
  </div>

  <div class="card">
    <div class="ct" data-t="upload_title">📂 POS 엑셀 업로드</div>
    <div class="tip" data-t="upload_tip">
      Vela POS에서 내려받은 <b>오늘 최신</b> 엑셀(.xlsx)을 올려주세요.<br>
      COST 컬럼에 값이 있는 상품만 따로 뽑아 <b>지점별로 이름이 붙은 새 파일</b>로 저장합니다.
    </div>
    <label class="drop" id="drop">
      <input type="file" id="pf" accept=".xlsx,.xls,.csv" onchange="onFile(this.files[0])">
      <div class="ico">📊</div>
      <div class="ut" data-t="drop_main">엑셀 파일 선택 또는 드래그</div>
      <div class="uh">.xlsx · .xls · .csv</div>
    </label>
  </div>

  <div class="card hidden" id="map-card">
    <div class="ct" data-t="map_title">🗂️ 컬럼 확인</div>
    <div class="tip" data-t="map_tip">자동 감지됨. 필요 시 수정 후 <b>적용</b>.</div>
    <div class="mapr"><label data-t="cost_label">원가 (COST)</label><select id="m-cost"></select></div>
    <button class="btn btn-g" onclick="apply()" style="margin-top:6px;width:100%" data-t="apply_btn">✅ 적용 — COST 있는 행만 추출</button>
  </div>

  <div class="card hidden" id="result-card">
    <div class="ct" data-t="result_title">✨ 결과</div>
    <div class="stats">
      <div class="stat"><div class="n" id="s-total">0</div><div class="l" data-t="stat_total">전체</div></div>
      <div class="stat"><div class="n" id="s-cost" style="color:#2e8b57">0</div><div class="l" data-t="stat_cost">COST 있음</div></div>
      <div class="stat"><div class="n" id="s-skip" style="color:#c62828">0</div><div class="l" data-t="stat_skip">COST 없음 (제외)</div></div>
    </div>
    <button class="btn btn-g" onclick="sendToLookup()" style="width:100%;margin-bottom:8px;background:#2e8b57" data-t="send_lookup_btn">🔗 상품조회로 전송 (이 지점 자동 반영)</button>
    <button class="btn btn-o" onclick="downloadFiltered()" style="width:100%;margin-bottom:8px" data-t="download_btn">📥 필터된 엑셀 다운로드</button>
    <div style="font-size:12px;color:#888;margin:6px 0 4px" data-t="preview_label">미리보기 (처음 30행)</div>
    <div class="twrap">
      <table id="prev-tbl"><thead></thead><tbody></tbody></table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function id(x){return document.getElementById(x);}
function toast(m){const t=id('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

/* ========== I18N ========== */

    toast_downloaded: (b) => `✅ Descarga completa para ${b}`,

};
let LANG = 'ko';
try { LANG = localStorage.getItem('kimchi_lang') || 'ko'; } catch(e){}
function t(k){ return T[LANG][k] ?? T.ko[k] ?? k; }
function setLang(l){
  LANG = T[l] ? l : 'ko';
  try { localStorage.setItem('kimchi_lang', LANG); } catch(e){}
  applyLang();
}
function applyLang(){
  document.documentElement.lang = LANG;
  document.title = t('title').replace(/^[^\w]*/, '') + ' | Kimchi Mart';
  document.querySelectorAll('[data-t]').forEach(el => {
    const k = el.getAttribute('data-t');
    const v = t(k);
    if (typeof v === 'string') el.innerHTML = v;
  });
  ['ko','en','es'].forEach(l => {
    const b = id('lb-'+l); if (b) b.classList.toggle('active', l === LANG);
  });
  // Refresh branch status message (uses dynamic i18n)
  if (typeof setBranch === 'function') setBranch(BRANCH);
}

const BRANCH_LABELS = {
  MIAMI: { ko:'마이애미', en:'Miami', es:'Miami' },
  PEMBROKE_PINES: { ko:'펨브로크 파인즈', en:'Pembroke Pines', es:'Pembroke Pines' },
  HOLLYWOOD: { ko:'할리우드', en:'Hollywood', es:'Hollywood' },
  CORAL_SPRINGS: { ko:'코럴 스프링스', en:'Coral Springs', es:'Coral Springs' },
  LASOLAS: { ko:'라스올라스', en:'LASOLAS', es:'LASOLAS' },
  WEST_PALM: { ko:'웨스트 팜 비치', en:'West Palm Beach', es:'West Palm Beach' }
};
function branchName(code){ return (BRANCH_LABELS[code]||{})[LANG] || code || ''; }

let BRANCH = '';
try { BRANCH = localStorage.getItem('km_branch') || ''; } catch(e){}

function setBranch(v){
  BRANCH = v || '';
  try { localStorage.setItem('km_branch', BRANCH); } catch(e){}
  const s = id('branch-status');
  if (s) s.textContent = BRANCH ? t('branch_ok')(branchName(BRANCH)) : t('branch_none');
}
window.addEventListener('DOMContentLoaded', () => {
  const sel = id('branch-sel'); if (sel) sel.value = BRANCH;
  applyLang();
  setBranch(BRANCH);
});

let HEADERS = [];
let ROWS    = [];
let FILTERED = [];
let SRC_NAME = '';
let COST_COL = -1;

const drop = id('drop');
drop.addEventListener('dragover', e=>{e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave', ()=>drop.classList.remove('over'));
drop.addEventListener('drop', e=>{
  e.preventDefault();drop.classList.remove('over');
  const f=e.dataTransfer.files[0]; if(f) onFile(f);
});

function onFile(f){
  if (!f) return;
  SRC_NAME = f.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const all = XLSX.utils.sheet_to_json(ws, {defval:'', header:1});
      if (!all.length){ toast(t('toast_empty')); return; }
      HEADERS = all[0].map(h => String(h||'').trim());
      ROWS    = all.slice(1);

      const norm = s => s.toLowerCase().replace(/[\s_.-]/g,'');
      const lc = HEADERS.map(norm);
      COST_COL = lc.indexOf('cost');
      if (COST_COL < 0) COST_COL = lc.indexOf('원가');
      if (COST_COL < 0){
        for (let i=0; i<lc.length; i++){
          if (lc[i].includes('cost') && !lc[i].includes('price')){ COST_COL = i; break; }
        }
      }

      const sel = id('m-cost');
      sel.innerHTML = HEADERS.map((h,i) => `<option value="${i}">${h||'Col '+(i+1)}</option>`).join('');
      if (COST_COL >= 0) sel.value = COST_COL;

      id('map-card').classList.remove('hidden');
      toast(t('toast_loaded')(ROWS.length));
    } catch(err){
      console.error(err);
      toast(t('toast_parse_fail')(err.message));
    }
  };
  reader.readAsArrayBuffer(f);
}

function apply(){
  COST_COL = parseInt(id('m-cost').value);
  if (isNaN(COST_COL) || COST_COL < 0){ toast(t('toast_no_col')); return; }

  FILTERED = ROWS.filter(r => {
    const v = r[COST_COL];
    if (v === '' || v == null) return false;
    const n = parseFloat(String(v).replace(/[$,\s]/g,''));
    return isFinite(n) && n > 0;
  });

  id('s-total').textContent = ROWS.length.toLocaleString();
  id('s-cost').textContent  = FILTERED.length.toLocaleString();
  id('s-skip').textContent  = (ROWS.length - FILTERED.length).toLocaleString();

  const tbl = id('prev-tbl');
  tbl.querySelector('thead').innerHTML =
    '<tr>' + HEADERS.map(h => `<th>${h||''}</th>`).join('') + '</tr>';
  tbl.querySelector('tbody').innerHTML =
    FILTERED.slice(0,30).map(r =>
      '<tr>' + HEADERS.map((_,i) => {
        const v = r[i] ?? '';
        const isNum = i === COST_COL || /^-?\d+(\.\d+)?$/.test(String(v));
        return `<td class="${isNum?'num mono':''}">${String(v)}</td>`;
      }).join('') + '</tr>'
    ).join('');

  id('result-card').classList.remove('hidden');
  id('result-card').scrollIntoView({behavior:'smooth', block:'start'});
  toast(t('toast_applied')(FILTERED.length));

  // Auto-sync to downstream apps — the filtered result is the latest POS
  // snapshot so there's no reason to make users click & re-upload.
  //   • 상품조회 (lookup): push via Firebase under products/<BRANCH>
  //   • 가격 비교 (price-compare): stash POS rows in localStorage for
  //     auto-load at step 2 on that page.
  if (BRANCH && FILTERED.length){
    try { sendToLookup(); } catch(e){ console.warn('[pos-filter] auto lookup push failed:', e); }
    try { savePosForCompare(); } catch(e){ console.warn('[pos-filter] auto compare stash failed:', e); }
  }
}

// Convert FILTERED rows into the shape price-compare expects and stash in
// localStorage under a branch-scoped key. Price-compare loads this on open.
function savePosForCompare(){
  if (!FILTERED.length || !BRANCH) return;
  rowToProduct._m = null;
  const rows = FILTERED.map(rowToProduct).filter(p => p.NAME && p.COST > 0).map(p => ({
    name:       p.NAME,
    barcode:    p.FULL_BARCODE || '',
    vendorCode: p.CODE || '',
    price:      p.COST,          // price-compare uses COST as the price field
    unit:       ''
  }));
  if (!rows.length) return;
  const payload = { timestamp: Date.now(), branchId: BRANCH, count: rows.length, rows };
  try {
    localStorage.setItem('kimchi-pos-import__' + BRANCH, JSON.stringify(payload));
    // Also write an unscoped copy so price-compare can find it quickly on
    // first load before it knows the branch.
    localStorage.setItem('kimchi-pos-import', JSON.stringify(payload));
  } catch(e){ console.warn('[pos-filter] localStorage full:', e); }
}

function rowToProduct(r){
  const norm = s => String(s||'').toLowerCase().replace(/[\s_.-]/g,'');
  const hl = HEADERS.map(norm);
  const idx = (want) => {
    for (const w of want){ const i = hl.indexOf(w); if (i >= 0) return i; }
    return -1;
  };
  if (!rowToProduct._m){
    const bcIdx   = idx(['fullbarcode','barcode','upc','ean']);
    const codeIdx = idx(['code']);
    const itemIdx = idx(['itemnumber','itemno','itemcode','item']);
    const pluIdx  = idx(['plu']);

    // Vela POS often labels the UPC column simply "CODE" — sniff a few
    // sample values to see if they're actually barcode-length numbers,
    // and remap so FULL_BARCODE gets the UPC and CODE gets the vendor code.
    let FULL_BARCODE = bcIdx;
    let CODE = -1;
    const sampleDigits = (i) => {
      if (i < 0) return '';
      for (const row of (FILTERED.length ? FILTERED : ROWS).slice(0, 20)){
        const v = row[i];
        if (v === '' || v == null) continue;
        const d = String(v).replace(/\D/g, '');
        if (d) return d;
      }
      return '';
    };
    if (FULL_BARCODE < 0 && codeIdx >= 0 && sampleDigits(codeIdx).length >= 11){
      FULL_BARCODE = codeIdx;
      CODE = itemIdx >= 0 ? itemIdx : pluIdx;
    } else {
      CODE = itemIdx >= 0 ? itemIdx : (pluIdx >= 0 ? pluIdx : codeIdx);
    }

    rowToProduct._m = {
      PID: idx(['pid','productid','id']),
      FULL_BARCODE,
      CODE,
      CATEGORY: idx(['category','dept','department','cat']),
      NAME: idx(['name','productname','description','desc']),
      PRICE: idx(['price','retailprice','sellprice','sellingprice']),
      COST: COST_COL,
      STOCK: idx(['stock','qty','onhand','inventory','inv']),
      VENDOR: idx(['vendor','supplier','brand'])
    };
  }
  const M = rowToProduct._m;
  const toNum = v => { if (v==='' || v==null) return 0; const n=parseFloat(String(v).replace(/[,$\s]/g,'')); return isNaN(n)?0:n; };
  const s = v => String(v==null?'':v).trim();
  return {
    PID:          M.PID>=0 ? s(r[M.PID]) : '',
    FULL_BARCODE: M.FULL_BARCODE>=0 ? s(r[M.FULL_BARCODE]) : '',
    CODE:         M.CODE>=0 ? s(r[M.CODE]) : '',
    CATEGORY:     M.CATEGORY>=0 ? s(r[M.CATEGORY]) : '',
    NAME:         M.NAME>=0 ? s(r[M.NAME]) : '',
    PRICE:        M.PRICE>=0 ? toNum(r[M.PRICE]) : 0,
    COST:         M.COST>=0 ? toNum(r[M.COST]) : 0,
    STOCK:        M.STOCK>=0 ? toNum(r[M.STOCK]) : 0,
    VENDOR:       M.VENDOR>=0 ? s(r[M.VENDOR]) : ''
  };
}

async function sendToLookup(){
  if (!FILTERED.length){ toast(t('toast_no_rows')); return; }
  if (!BRANCH){ toast(t('toast_no_branch')); return; }
  rowToProduct._m = null;
  const products = FILTERED.map(rowToProduct).filter(p => p.FULL_BARCODE || p.CODE);
  if (!products.length){ toast(t('toast_no_mapped')); return; }
  const today = new Date().toISOString().slice(0,10);
  const payload = { timestamp: Date.now(), date: today, count: products.length, rows: products, branchId: BRANCH };
  toast(t('toast_sending'), 4000);
  try {
    const url = `https://kimchi-mart-order-default-rtdb.firebaseio.com/products/${BRANCH}.json`;
    const res = await fetch(url, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    toast(t('toast_sent')(branchName(BRANCH), products.length));
  } catch(e){ console.error(e); toast(t('toast_send_fail')(e.message)); }
}

function downloadFiltered(){
  if (!FILTERED.length){ toast(t('toast_no_rows')); return; }
  if (!BRANCH){ toast(t('toast_no_branch')); return; }
  const aoa = [HEADERS, ...FILTERED];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'COST_Filtered');
  const base = SRC_NAME.replace(/\.(xlsx|xls|csv)$/i, '') || 'pos';
  const today = new Date().toISOString().slice(0,10);
  const branchLbl = branchName(BRANCH);
  XLSX.writeFile(wb, `${branchLbl}_${base}_cost_${today}.xlsx`);
  toast(t('toast_downloaded')(branchLbl));
}
