<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Inter','Segoe UI','Malgun Gothic',Arial,sans-serif;
  background:linear-gradient(180deg,#fffaf5 0%,#faf6f1 100%);
  background-attachment:fixed;
  color:#0f172a;min-height:100vh;font-size:14px;
  -webkit-font-smoothing:antialiased;letter-spacing:-.005em;
}
button,input,textarea,select{font-family:inherit}

/* TOP BAR — glassmorphism */
.topbar{
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(140%) blur(10px);
  -webkit-backdrop-filter:saturate(140%) blur(10px);
  border-bottom:1px solid rgba(15,23,42,.06);
  padding:11px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:50;
}
.back{background:transparent;border:0;font-size:1.3em;color:#94a3b8;padding:0 4px;cursor:pointer;transition:.15s}
.back:hover{color:#0f172a}
.brand{font-weight:900;color:#0f172a;display:flex;align-items:center;gap:9px;font-size:1em;letter-spacing:-.02em}
.brand .logo{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,#1a5c3a,#16a34a);
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;
  box-shadow:0 4px 12px rgba(22,163,74,.25);
}
.spacer{flex:1}
.me-pill{
  background:#f0fdf4;color:#1a5c3a;border:1px solid #bbf7d0;
  border-radius:20px;padding:6px 13px;font-size:.78em;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s;
}
.me-pill:hover{background:#dcfce7;transform:translateY(-1px);box-shadow:0 3px 10px rgba(22,163,74,.18)}
.me-pill .av{width:22px;height:22px;border-radius:50%;background:#1a5c3a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:800}
.btn{
  background:linear-gradient(135deg,#1a5c3a,#16a34a);color:#fff;border:0;
  border-radius:10px;padding:9px 16px;font-size:.88em;font-weight:700;cursor:pointer;
  transition:.15s;letter-spacing:-.005em;
}
.btn:hover{box-shadow:0 6px 16px rgba(22,163,74,.30);transform:translateY(-1px)}
.btn.secondary{background:#fff;color:#1a5c3a;border:1.5px solid rgba(26,92,58,.30)}
.btn.secondary:hover{background:#f0fdf4;border-color:#1a5c3a}
.btn.danger{background:linear-gradient(135deg,#991b1b,#dc2626)}
.btn.danger:hover{box-shadow:0 6px 16px rgba(220,38,38,.30)}

.page{max-width:720px;margin:0 auto;padding:18px 14px}

/* COMPOSE FAB */
.compose-fab{
  position:fixed;right:18px;bottom:18px;
  background:linear-gradient(135deg,#1a5c3a,#16a34a);color:#fff;
  border:0;border-radius:50%;width:60px;height:60px;font-size:1.6em;
  cursor:pointer;box-shadow:0 8px 24px rgba(22,163,74,.40);z-index:40;
  display:none;transition:all .25s cubic-bezier(.2,.8,.2,1);
}
.compose-fab.show{display:flex;align-items:center;justify-content:center}
.compose-fab:hover{transform:scale(1.06) rotate(90deg);box-shadow:0 12px 32px rgba(22,163,74,.50)}

/* FILTER CHIPS */
.filters{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;
  background:#fff;border:1px solid rgba(15,23,42,.06);
  border-radius:14px;padding:9px;
  box-shadow:0 1px 3px rgba(15,23,42,.04);
}
.chip{
  background:#f5f5f7;border:1px solid transparent;
  border-radius:18px;padding:6px 13px;font-size:.78em;font-weight:700;
  color:#475569;cursor:pointer;transition:.15s;letter-spacing:-.005em;
}
.chip:hover{background:#e5e7eb;color:#0f172a}
.chip.active{
  background:linear-gradient(135deg,#1a5c3a,#16a34a);
  color:#fff;border-color:transparent;
  box-shadow:0 3px 10px rgba(22,163,74,.30);
}

/* UPDATE CARD — modern with hover lift */
.update{
  background:#fff;border:1px solid rgba(15,23,42,.06);
  border-radius:16px;padding:18px;margin-bottom:13px;
  box-shadow:0 1px 3px rgba(15,23,42,.04);
  position:relative;overflow:hidden;
  transition:all .25s cubic-bezier(.2,.8,.2,1);
  animation:cardIn .5s cubic-bezier(.2,.8,.2,1) backwards;
}
.update:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(15,23,42,.10)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.update::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,#1a5c3a,#16a34a);
}
.update.priority-important::before{background:linear-gradient(180deg,#f59e0b,#d97706)}
.update.priority-urgent::before{background:linear-gradient(180deg,#dc2626,#991b1b)}
.update.priority-urgent{background:linear-gradient(135deg,#fffbeb 0%,#fff 60%)}
.update .meta{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.update .meta .av{
  width:36px;height:36px;border-radius:50%;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.78em;flex-shrink:0;
  box-shadow:0 3px 8px rgba(15,23,42,.10);
}
.update .meta .who{flex:1;min-width:0}
.update .meta .nm{font-weight:800;font-size:.92em;color:#0f172a;letter-spacing:-.005em}
.update .meta .sub{font-size:.72em;color:#94a3b8;margin-top:2px;font-weight:500}
.update .badges{display:flex;gap:5px;flex-wrap:wrap}
.update .badge{
  font-size:.66em;font-weight:800;padding:3px 9px;
  border-radius:10px;background:#f3f4f6;color:#475569;
  letter-spacing:.02em;
}
.update .badge.urgent{background:#fef2f2;color:#dc2626}
.update .badge.important{background:#fef3c7;color:#92400e}
.update .badge.audience{background:#dbeafe;color:#1e40af}
.update .badge.audience.managers{background:#fce7f3;color:#9f1239}
.update h3{font-size:1.08em;font-weight:800;margin:8px 0 7px;color:#0f172a;letter-spacing:-.01em;line-height:1.3}
.update .body{font-size:.92em;line-height:1.55;color:#475569;white-space:pre-wrap;word-break:break-word}
.update .photos{display:grid;gap:5px;margin-top:11px;border-radius:12px;overflow:hidden;max-width:480px}
.update .photos.n1{grid-template-columns:1fr}
.update .photos.n2{grid-template-columns:repeat(2,1fr)}
.update .photos.n3,.update .photos.n4{grid-template-columns:repeat(2,1fr)}
.update .photos.n5,.update .photos.n6{grid-template-columns:repeat(3,1fr)}
.update .photos img{width:100%;height:140px;object-fit:cover;cursor:pointer;background:#e5e7eb;display:block;transition:transform .25s}
.update .photos img:hover{transform:scale(1.03)}
.update .photos.n1 img{height:auto;max-height:340px}
.update .actions{display:flex;gap:6px;margin-top:12px;color:#94a3b8;font-size:.82em;align-items:center;font-weight:600}
.update .reads{margin-left:auto;font-size:.78em;color:#94a3b8}
.update .del{
  background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;
  border-radius:8px;padding:5px 11px;font-size:.74em;font-weight:700;
  cursor:pointer;display:none;transition:.15s;
}
.update.mine .del{display:inline-block}
.update .del:hover{background:#dc2626;color:#fff;border-color:transparent}

.empty{text-align:center;padding:64px 20px;color:#94a3b8}
.empty .ico{font-size:3.2em;margin-bottom:14px;animation:bounce 2.5s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.empty .msg{font-size:.95em;font-weight:600;color:#475569;margin-bottom:6px}
.empty .sub{font-size:.82em;color:#94a3b8}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:14px}
.overlay.show{display:flex;animation:overlayIn .2s ease-out}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal{
  background:#fff;border-radius:18px;padding:24px;max-width:520px;width:100%;
  max-height:92vh;overflow:auto;
  box-shadow:0 30px 60px rgba(15,23,42,.20);
  animation:modalIn .28s cubic-bezier(.2,.8,.2,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:1.15em;font-weight:900;margin-bottom:16px;letter-spacing:-.01em}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78em;font-weight:700;color:#475569;margin-bottom:5px;letter-spacing:-.005em}
.field input,.field textarea,.field select{
  width:100%;border:1.5px solid rgba(15,23,42,.10);
  border-radius:10px;padding:10px 13px;font-size:.95em;font-family:inherit;
  color:#0f172a;background:#fff;transition:.15s;outline:0;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:#16a34a;box-shadow:0 0 0 4px rgba(22,163,74,.10);
}
.field textarea{resize:vertical;min-height:110px}
.field .row{display:flex;gap:8px}
.field .row > *{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.previews{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.previews .pv{position:relative;width:64px;height:64px;border-radius:10px;overflow:hidden;background:#e5e7eb}
.previews .pv img{width:100%;height:100%;object-fit:cover}
.previews .pv .x{position:absolute;top:3px;right:3px;background:rgba(15,23,42,.78);color:#fff;border:0;border-radius:50%;width:20px;height:20px;font-size:.72em;cursor:pointer;line-height:1}
input[type=file]{display:none}
.attach-row{display:flex;gap:8px;align-items:center}
.attach-row button{
  background:#f5f5f7;border:0;border-radius:10px;padding:9px 13px;
  font-size:.85em;font-weight:600;cursor:pointer;transition:.15s;color:#475569;
}
.attach-row button:hover{background:#e5e7eb;color:#0f172a}

.lightbox{display:none;position:fixed;inset:0;background:rgba(15,23,42,.95);z-index:200;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox.show{display:flex;animation:overlayIn .2s ease-out}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 30px 60px rgba(0,0,0,.4)}

#toast{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;
  padding:11px 20px;border-radius:24px;font-weight:700;font-size:.9em;
  z-index:300;display:none;box-shadow:0 12px 32px rgba(0,0,0,.20);
}
@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}

    <button onclick="setLang('ko')" data-ul="ko" style="background:#f4f6f9;color:#6b7280;border:1px solid #e5e7eb;border-radius:6px;padding:3px 8px;font-size:.72em;font-weight:700;cursor:pointer">KO</button>

<!-- COMPOSE MODAL (managers only) -->
<div class="overlay" id="composeOverlay">

        <label>중요도</label>

      </div>

    </div>
  </div>
</div>

<!-- ME MODAL (same identity as chat) -->
<div class="overlay" id="meOverlay">
  <div class="modal">
    <h3>본인 이름 선택</h3>
    <div style="font-size:.85em;color:#6b7280;margin-bottom:12px">매니저는 공지를 작성할 수 있습니다.</div>
    <div class="field">
      <label>지점</label>
      <select id="meBranch" onchange="renderMeNames()"></select>

    <div class="field">
      <label>이름</label>
      <select id="meName_select"></select>
    </div>
    <div class="field">
      <label>또는 직접 입력 (스케줄에 없는 경우)</label>
      <input type="text" id="meCustom" placeholder="이름을 입력">

    <div class="modal-actions">
      <button class="btn secondary" onclick="closeOverlay('meOverlay')">취소</button>
      <button class="btn" onclick="saveMe()">저장</button>

</div>

<script>
const FB_DB_URL = 'https://kimchi-mart-order-default-rtdb.firebaseio.com';
const FB_STORAGE_BUCKET = 'kimchi-mart-order.firebasestorage.app';
const FB_STORAGE_URL = `https://firebasestorage.googleapis.com/v0/b/${FB_STORAGE_BUCKET}/o`;

// ===== LANGUAGE =====
let LANG = localStorage.getItem('kimchi_lang') || localStorage.getItem('hub.lang') || localStorage.getItem('tasks.lang') || 'en';
const UP_T = {
  en: {
    brand:'📣 Announcements', me_select:'Select name',
    filter_all:'📋 All', filter_urgent:'🚨 Urgent/Important', filter_branch:'🏢 My Branch', filter_mine:'✏ My Posts',

  },

    pri_urgent:'🚨 Urgente', pri_important:'⚠ Importante',
    del:'🗑 Eliminar',
    just_now:'ahora', min_ago:'min', hr_ago:'h',

};
function t(k){ return (UP_T[LANG] || UP_T.en)[k] || (UP_T.en)[k] || k; }
function setLang(l){
  if (!['ko','en','es'].includes(l)) return;
  LANG = l;
  localStorage.setItem('kimchi_lang', l);
  localStorage.setItem('hub.lang', l);
  localStorage.setItem('tasks.lang', l);
  applyUpLang();
  window.dispatchEvent(new CustomEvent('km-lang-changed', { detail: l }));
}
function applyUpLang(){
  const el = document.getElementById('upBrand'); if (el) el.textContent = t('brand');
  const mn = document.getElementById('meName'); if (mn && !me) mn.textContent = t('me_select');
  document.querySelectorAll('[data-ul]').forEach(b => {
    const isActive = b.dataset.ul === LANG;
    b.style.background = isActive ? '#1a5c3a' : '#f4f6f9';
    b.style.color = isActive ? '#fff' : '#6b7280';
    b.style.borderColor = isActive ? '#1a5c3a' : '#e5e7eb';
  });
  renderFeed();
}
window.addEventListener('km-lang-changed', e => { if (e.detail && e.detail !== LANG) { LANG = e.detail; applyUpLang(); } });
window.addEventListener('storage', e => {
  if (e.key === 'kimchi_lang' && e.newValue && e.newValue !== LANG) { LANG = e.newValue; applyUpLang(); }
});

const BRANCHES = [
  { id:'MIAMI',         ko:'마이애미',       en:'Miami',         es:'Miami' },
  { id:'PEMBROKE_PINES',ko:'펨브로크 파인즈', en:'Pembroke Pines',es:'Pembroke Pines' },
  { id:'HOLLYWOOD',     ko:'할리우드',        en:'Hollywood',     es:'Hollywood' },
  { id:'CORAL_SPRINGS', ko:'코럴 스프링스',   en:'Coral Springs', es:'Coral Springs' },
  { id:'LASOLAS',       ko:'라스올라스',      en:'Las Olas',      es:'Las Olas' },
  { id:'WEST_PALM',     ko:'웨스트 팜 비치',  en:'West Palm',     es:'West Palm' },
];
const BRANCH_BY_ID = Object.fromEntries(BRANCHES.map(b => [b.id, b]));
const COLORS = ['#22c55e','#3b82f6','#a855f7','#ec4899','#f59e0b','#ef4444','#06b6d4','#0ea5e9','#84cc16','#f97316'];
const MANAGER_TOKENS = ['MANAGER','SUPERVISOR','OFFICE','OWNER','매니저','점장','감독'];

function colorFor(name){
  let h=0; for (let i=0;i<name.length;i++) h = (h*31+name.charCodeAt(i))|0;
  return COLORS[Math.abs(h)%COLORS.length];
}
function initialsOf(name){ return (name||'?').split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase(); }
function isManagerRole(role){
  if (!role) return false;
  const r = role.toUpperCase();
  return MANAGER_TOKENS.some(t => r.includes(t));
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTimeAgo(ts){
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return t('just_now');
  if (diff < 3600) return Math.floor(diff/60) + t('min_ago');
  if (diff < 86400) return Math.floor(diff/3600) + t('hr_ago');
  const d = new Date(ts);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}
function branchName(b){ return b ? (b[LANG] || b.en || b.ko) : ''; }
function showToast(msg, color){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color || '#1a5c3a'; t.style.display = 'block';
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => { t.style.display = 'none'; }, 2200);
}
function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }
function openLightbox(url){ document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').classList.add('show'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); }));

// ===== ME (shared identity with chat.html) =====
let me = (function(){ try { return JSON.parse(localStorage.getItem('chat.me') || 'null'); } catch(e){ return null; } })();

function ensureMe(){
  if (!me || !me.name) { openMeModal(); return false; }
  return true;
}
function openMeModal(){
  document.getElementById('meBranch').innerHTML = BRANCHES.map(b => `<option value="${b.id}" ${me?.branch===b.id?'selected':''}>${b.ko}</option>`).join('');
  document.getElementById('meCustom').value = me?.name || '';
  renderMeNames();
  document.getElementById('meOverlay').classList.add('show');
}
function renderMeNames(){
  const branchId = document.getElementById('meBranch').value;
  let employees = [];
  try {
    const data = JSON.parse(localStorage.getItem('shifts.' + branchId) || 'null');
    if (data && data.employees) employees = data.employees;
  } catch(e){}
  if (employees.length === 0) {
    fetch(`${FB_DB_URL}/schedules/${branchId}.json`).then(r => r.json()).then(d => {
      if (d?.employees) renderMeNamesList(d.employees);
    });
  }
  renderMeNamesList(employees);
}
function renderMeNamesList(employees){
  const sel = document.getElementById('meName_select');
  sel.innerHTML = '<option value="">— 직접 입력 —</option>' +
    employees.map(e => `<option value="${e.name}" data-role="${e.role||''}" ${me?.name===e.name?'selected':''}>${e.name} (${e.role||''})${isManagerRole(e.role)?' 👔':''}</option>`).join('');
  sel.onchange = () => {
    if (sel.value) document.getElementById('meCustom').value = sel.value;
    const role = sel.options[sel.selectedIndex]?.dataset.role || '';
    document.getElementById('meRoleHint').textContent = role
      ? (isManagerRole(role) ? `👔 매니저 권한 (역할: ${role}) — 공지 작성 가능` : `일반 직원 (역할: ${role}) — 읽기만 가능`)
      : '';
  };
}
function saveMe(){
  const branchId = document.getElementById('meBranch').value;
  const sel = document.getElementById('meName_select');
  const fromSel = sel.value;
  const selRole = sel.options[sel.selectedIndex]?.dataset.role || '';
  const fromCustom = document.getElementById('meCustom').value.trim();
  const name = fromCustom || fromSel;
  if (!name) { showToast(t('toast_name'), '#dc2626'); return; }
  let role = selRole;
  if (!role && fromCustom) {
    try {
      const data = JSON.parse(localStorage.getItem('shifts.' + branchId) || 'null');
      const emp = data?.employees?.find(e => e.name.toLowerCase() === fromCustom.toLowerCase());
      role = emp?.role || '';
    } catch(e){}
  }
  me = { name, branch: branchId, color: colorFor(name), role, isManager: isManagerRole(role) };
  localStorage.setItem('chat.me', JSON.stringify(me));
  refreshMePill();
  refreshComposeFab();
  closeOverlay('meOverlay');
  renderFeed();   // re-render with new "mine" + audience filter
}
function refreshMePill(){
  if (!me) return;
  document.getElementById('meAv').textContent = initialsOf(me.name);
  document.getElementById('meAv').style.background = me.color || '#1a5c3a';
  const branch = BRANCH_BY_ID[me.branch];
  document.getElementById('meName').textContent = (me.isManager ? '👔 ' : '') + me.name + (branch ? ' · ' + branchName(branch) : '');
}
function refreshComposeFab(){
  const fab = document.getElementById('composeFab');
  fab.classList.toggle('show', !!me?.isManager);
}

// ===== UPDATES STATE =====
let UPDATES = [];
let ATTACH = [];   // composer attachments [{dataUrl, blob}]
let FILTER = localStorage.getItem('updates.filter') || 'all';   // all | unread | mine

function renderFilters(){
  const cont = document.getElementById('filters');
  const opts = [
    { id:'all',      label: t('filter_all') },
    { id:'urgent',   label: t('filter_urgent') },
    { id:'mybranch', label: t('filter_branch') },
    me?.isManager ? { id:'mine', label: t('filter_mine') } : null,
  ].filter(Boolean);
  cont.innerHTML = opts.map(o => `<div class="chip ${o.id===FILTER?'active':''}" onclick="setFilter('${o.id}')">${o.label}</div>`).join('');
}
function setFilter(id){ FILTER = id; localStorage.setItem('updates.filter', id); renderFilters(); renderFeed(); }

function visibleUpdates(){
  return UPDATES.filter(u => {
    // audience visibility
    if (u.audience === 'managers' && !me?.isManager) return false;
    if (u.audience !== 'all' && u.audience !== 'managers' && u.audience !== me?.branch && u.audience) {
      // branch-specific update — not for me
      if (!me?.isManager) return false;   // managers can see all branch-specific updates
    }
    // filter chip
    if (FILTER === 'urgent') return u.priority === 'urgent' || u.priority === 'important';
    if (FILTER === 'mybranch') return u.audience === me?.branch || u.audience === 'all';
    if (FILTER === 'mine') return u.author === me?.name && u.authorBranch === me?.branch;
    return true;
  }).sort((a,b) => (b.ts||0) - (a.ts||0));
}

function renderFeed(){
  renderFilters();
  const feed = document.getElementById('feed');
  const list = visibleUpdates();
  if (list.length === 0) {
    feed.innerHTML = `<div class="empty"><div class="ico">📣</div><div>${t('empty_no')}</div>${me?.isManager ? `<div style="font-size:.85em;margin-top:6px">${t('empty_hint')}</div>` : ''}</div>`;
    return;
  }
  feed.innerHTML = list.map(u => renderCard(u)).join('');
}
function renderCard(u){
  const mine = me && u.author === me.name && u.authorBranch === me.branch;
  const branch = BRANCH_BY_ID[u.authorBranch];
  const branchTxt = branchName(branch);
  const audLabel = u.audience === 'all' ? t('aud_all')
    : u.audience === 'managers' ? t('aud_mgr')
    : branchName(BRANCH_BY_ID[u.audience]) || u.audience;
  const audClass = u.audience === 'managers' ? 'audience managers' : 'audience';
  const photosHtml = (u.photos && u.photos.length)
    ? `<div class="photos n${Math.min(u.photos.length,6)}">${u.photos.map(url => `<img src="${url}" onclick="openLightbox('${url}')">`).join('')}</div>`
    : '';
  const priClass = u.priority === 'urgent' ? 'priority-urgent' : u.priority === 'important' ? 'priority-important' : '';
  const priBadge = u.priority === 'urgent' ? `<span class="badge urgent">${t('pri_urgent')}</span>`
                  : u.priority === 'important' ? `<span class="badge important">${t('pri_important')}</span>`
                  : '';
  const color = u.color || colorFor(u.author || '?');
  return `<div class="update ${priClass} ${mine?'mine':''}" data-id="${u.id}">
    <div class="meta">
      <div class="av" style="background:${color}">${initialsOf(u.author)}</div>
      <div class="who">
        <div class="nm">${u.isManager?'👔 ':''}${escapeHtml(u.author||'?')}${branchTxt?' · '+escapeHtml(branchTxt):''}</div>
        <div class="sub">${fmtTimeAgo(u.ts || 0)}</div>
      </div>
      <div class="badges">${priBadge}<span class="badge ${audClass}">📍 ${escapeHtml(audLabel)}</span></div>
    </div>
    ${u.title ? `<h3>${escapeHtml(u.title)}</h3>` : ''}
    ${u.body ? `<div class="body">${escapeHtml(u.body)}</div>` : ''}
    ${photosHtml}
    ${mine ? `<div class="actions"><button class="del" onclick="deleteUpdate('${u.id}')">${t('del')}</button></div>` : ''}
  </div>`;
}

// ===== COMPOSER =====
function openComposeModal(){
  if (!ensureMe()) return;
  if (!me.isManager) { showToast(t('toast_mgr_only'), '#dc2626'); return; }
  document.getElementById('cTitle').value = '';
  document.getElementById('cBody').value = '';
  document.getElementById('cPriority').value = 'normal';
  document.getElementById('cAudience').value = 'all';
  ATTACH = [];
  document.getElementById('cPreviews').innerHTML = '';
  document.getElementById('cAttachCount').textContent = '';
  document.getElementById('composeOverlay').classList.add('show');
}

async function handleFiles(ev){
  const files = Array.from(ev.target.files || []);
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const compressed = await compressImage(f);
    ATTACH.push(compressed);
  }
  ev.target.value = '';
  renderPreviews();
}
function renderPreviews(){
  const wrap = document.getElementById('cPreviews');
  wrap.innerHTML = ATTACH.map((a, i) => `<div class="pv"><img src="${a.dataUrl}"><button class="x" onclick="removeAttach(${i})">✕</button></div>`).join('');
  document.getElementById('cAttachCount').textContent = ATTACH.length ? `${ATTACH.length}장 첨부됨` : '';
}
function removeAttach(i){ ATTACH.splice(i,1); renderPreviews(); }
function compressImage(file, maxDim, quality){
  maxDim = maxDim || 1280; quality = quality || 0.78;
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxDim || h > maxDim) { const r = Math.min(maxDim/w, maxDim/h); w = Math.round(w*r); h = Math.round(h*r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = () => resolve({ dataUrl: reader.result, blob, file });
        reader.readAsDataURL(blob);
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve({ dataUrl:'', blob:null, file }); };
    img.src = url;
  });
}
// Storage REST first, base64-RTDB fallback if Storage isn't enabled / fails
async function uploadPhoto(att, updateId, idx){
  const path = `updates/${updateId}/${idx}.jpg`;
  try {
    const r = await fetch(`${FB_STORAGE_URL}?name=${encodeURIComponent(path)}&uploadType=media`, {
      method:'POST', headers:{'Content-Type':'image/jpeg'}, body: att.blob
    });
    if (r.ok) {
      const meta = await r.json();
      return `${FB_STORAGE_URL}/${encodeURIComponent(meta.name)}?alt=media&token=${meta.downloadTokens || ''}`;
    }
  } catch(e){}
  // Recompress smaller for RTDB embedding
  const small = att.file ? await compressImage(att.file, 720, 0.55) : att;
  return small.dataUrl;
}

async function postUpdate(){
  if (!me?.isManager) return;
  const title = document.getElementById('cTitle').value.trim();
  const body = document.getElementById('cBody').value.trim();
  if (!title && !body && ATTACH.length === 0) { showToast('제목 / 내용 / 사진 중 하나는 입력하세요', '#dc2626'); return; }
  const priority = document.getElementById('cPriority').value;
  const audience = document.getElementById('cAudience').value;
  const ts = Date.now();
  const id = 'u' + ts + Math.floor(Math.random()*900);
  const btn = document.getElementById('cPostBtn');
  btn.disabled = true; btn.textContent = '게시 중...';

  try {
    const photos = [];
    for (let i = 0; i < ATTACH.length; i++) {
      const url = await uploadPhoto(ATTACH[i], id, i);
      photos.push(url);
      btn.textContent = `사진 ${i+1}/${ATTACH.length}...`;
    }
    const payload = {
      author: me.name, authorBranch: me.branch, color: me.color, isManager: true,
      title, body, priority, audience, photos, ts
    };
    await fetch(`${FB_DB_URL}/updates/${id}.json`, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    closeOverlay('composeOverlay');
    showToast('✓ 공지가 게시되었습니다');
  } catch (e) {
    showToast('게시 실패: ' + e.message, '#dc2626');
  } finally {
    btn.disabled = false; btn.textContent = '📤 게시';
  }
}

let __delArmed = {};
async function deleteUpdate(id){
  const u = UPDATES.find(x => x.id === id);
  if (!u || !me || u.author !== me.name || u.authorBranch !== me.branch) return;
  if (!__delArmed[id]) {
    __delArmed[id] = true;
    const card = document.querySelector(`.update[data-id="${id}"] .del`);
    if (card) { card.textContent = '한 번 더 클릭'; card.style.background = '#7f1d1d'; }
    setTimeout(() => {
      __delArmed[id] = false;
      const c = document.querySelector(`.update[data-id="${id}"] .del`);
      if (c) { c.textContent = '🗑 삭제'; c.style.background = ''; }
    }, 4000);
    return;
  }
  // delete photos
  if (u.photos) for (let i = 0; i < u.photos.length; i++) {
    fetch(`${FB_STORAGE_URL}/${encodeURIComponent('updates/'+id+'/'+i+'.jpg')}`, {method:'DELETE'}).catch(()=>{});
  }
  await fetch(`${FB_DB_URL}/updates/${id}.json`, {method:'DELETE'});
  showToast('🗑 공지 삭제됨', '#dc2626');
}

// ===== SUBSCRIBE =====
function applyUpdates(d){
  if (!d) { UPDATES = []; renderFeed(); return; }
  UPDATES = Object.entries(d).map(([id, u]) => Object.assign({id}, u));
  renderFeed();
  // 페이지를 봤다는 표시 — 가장 최근 업데이트의 ts 를 lastSeenTs 로 저장 → 사이드바 배지 0
  const maxTs = UPDATES.reduce((m, u) => Math.max(m, u.ts || 0), 0);
  if (maxTs > 0) {
    try { localStorage.setItem('updates.lastSeenTs', String(maxTs)); } catch(e){}
    try { window.dispatchEvent(new Event('km-updates-seen')); } catch(e){}
  }
}
function fetchRest(){
  fetch(`${FB_DB_URL}/updates.json?t=${Date.now()}`, {cache:'no-store'})
    .then(r => r.json())
    .then(applyUpdates)
    .catch(()=>{});
}
function subscribe(){
  fetchRest();
  if (!window.__fb) return;
  const { db, ref, onValue } = window.__fb;
  onValue(ref(db, 'updates'), snap => applyUpdates(snap.val()));
}
window.addEventListener('fb-ready', subscribe);
setTimeout(() => { if (!window.__fb) fetchRest(); }, 2500);

// expose
Object.assign(window, {
  openMeModal, saveMe, renderMeNames, openComposeModal, postUpdate,
  handleFiles, removeAttach, deleteUpdate, openLightbox, closeOverlay, setFilter, setLang,
});

// ===== INIT =====
applyUpLang();
if (me) { refreshMePill(); refreshComposeFab(); } else { openMeModal(); }
fetchRest();
renderFeed();
</script>
