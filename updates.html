<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>김치마트 — 공지</title>
<link rel="manifest" href="pwa-assets/manifest.webmanifest">
<meta name="theme-color" content="#1a5c3a">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',Arial,sans-serif;background:#f4f6f9;color:#1f2937;min-height:100vh;font-size:14px}
button,input,textarea,select{font-family:inherit}

/* TOP BAR */
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.back{background:transparent;border:0;font-size:1.3em;color:#6b7280;padding:0 4px;cursor:pointer}
.brand{font-weight:800;color:#1a5c3a;display:flex;align-items:center;gap:8px;font-size:1em}
.brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1a5c3a,#2e7d32);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}
.spacer{flex:1}
.me-pill{background:#f0fdf4;color:#1a5c3a;border:1px solid #bbf7d0;border-radius:20px;padding:5px 12px;font-size:.78em;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.me-pill .av{width:22px;height:22px;border-radius:50%;background:#1a5c3a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:700}
.btn{background:#1a5c3a;color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:.88em;font-weight:600;cursor:pointer}
.btn.secondary{background:#fff;color:#1a5c3a;border:1px solid #1a5c3a}
.btn.danger{background:#dc2626}

.page{max-width:720px;margin:0 auto;padding:14px}

/* COMPOSE BUTTON (managers only) */
.compose-fab{position:fixed;right:18px;bottom:18px;background:#1a5c3a;color:#fff;border:0;border-radius:50%;width:56px;height:56px;font-size:1.5em;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:40;display:none}
.compose-fab.show{display:flex;align-items:center;justify-content:center}

/* FILTER CHIPS */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;background:#fff;border-radius:12px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chip{background:#f4f6f9;border:1px solid #e5e7eb;border-radius:18px;padding:5px 12px;font-size:.78em;font-weight:600;color:#374151;cursor:pointer}
.chip.active{background:#1a5c3a;color:#fff;border-color:#1a5c3a}

/* UPDATE CARD */
.update{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;border-left:4px solid #1a5c3a}
.update.priority-important{border-left-color:#f59e0b}
.update.priority-urgent{border-left-color:#dc2626;background:#fffbeb}
.update .meta{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.update .meta .av{width:34px;height:34px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78em;flex-shrink:0}
.update .meta .who{flex:1;min-width:0}
.update .meta .nm{font-weight:700;font-size:.92em}
.update .meta .sub{font-size:.72em;color:#9ca3af;margin-top:1px}
.update .badges{display:flex;gap:5px;flex-wrap:wrap}
.update .badge{font-size:.68em;font-weight:700;padding:2px 8px;border-radius:10px;background:#f3f4f6;color:#374151}
.update .badge.urgent{background:#fef2f2;color:#dc2626}
.update .badge.important{background:#fef3c7;color:#92400e}
.update .badge.audience{background:#dbeafe;color:#1e40af}
.update .badge.audience.managers{background:#fce7f3;color:#9f1239}
.update h3{font-size:1.05em;font-weight:700;margin:6px 0 6px}
.update .body{font-size:.92em;line-height:1.5;color:#374151;white-space:pre-wrap;word-break:break-word}
.update .photos{display:grid;gap:4px;margin-top:10px;border-radius:8px;overflow:hidden;max-width:480px}
.update .photos.n1{grid-template-columns:1fr}
.update .photos.n2{grid-template-columns:repeat(2,1fr)}
.update .photos.n3,.update .photos.n4{grid-template-columns:repeat(2,1fr)}
.update .photos.n5,.update .photos.n6{grid-template-columns:repeat(3,1fr)}
.update .photos img{width:100%;height:140px;object-fit:cover;cursor:pointer;background:#e5e7eb;display:block}
.update .photos.n1 img{height:auto;max-height:340px}
.update .actions{display:flex;gap:6px;margin-top:10px;color:#6b7280;font-size:.82em;align-items:center}
.update .reads{margin-left:auto;font-size:.78em;color:#9ca3af}
.update .del{background:#dc2626;color:#fff;border:0;border-radius:6px;padding:4px 10px;font-size:.75em;font-weight:600;cursor:pointer;display:none}
.update.mine .del{display:inline-block}

.empty{text-align:center;padding:60px 20px;color:#9ca3af}
.empty .ico{font-size:3em;margin-bottom:10px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;padding:14px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:520px;width:100%;max-height:92vh;overflow:auto}
.modal h3{font-size:1.1em;font-weight:700;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.78em;font-weight:600;color:#374151;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.95em;font-family:inherit}
.field textarea{resize:vertical;min-height:100px}
.field .row{display:flex;gap:8px}
.field .row > *{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.previews{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.previews .pv{position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;background:#e5e7eb}
.previews .pv img{width:100%;height:100%;object-fit:cover}
.previews .pv .x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:0;border-radius:50%;width:18px;height:18px;font-size:.7em;cursor:pointer}
input[type=file]{display:none}
.attach-row{display:flex;gap:8px;align-items:center}
.attach-row button{background:#f4f6f9;border:0;border-radius:8px;padding:8px 12px;font-size:.85em;cursor:pointer}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain}

#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a5c3a;color:#fff;padding:10px 18px;border-radius:20px;font-weight:600;font-size:.92em;z-index:300;display:none;box-shadow:0 4px 14px rgba(0,0,0,.2)}
</style>
</head>
<body>

<div class="topbar">
  <button class="back" onclick="location.href='hub.html'">←</button>
  <div class="brand"><div class="logo">K</div><span>📣 공지</span></div>
  <div class="spacer"></div>
  <button class="me-pill" id="mePill" onclick="openMeModal()">
    <div class="av" id="meAv">?</div>
    <span id="meName">이름 선택</span>
  </button>
</div>

<div class="page">

  <div class="filters" id="filters"></div>

  <div id="feed"></div>

</div>

<button class="compose-fab" id="composeFab" onclick="openComposeModal()" title="공지 작성">＋</button>

<div id="toast"></div>

<!-- COMPOSE MODAL (managers only) -->
<div class="overlay" id="composeOverlay">
  <div class="modal">
    <h3>📣 새 공지 작성</h3>
    <div class="field">
      <label>제목</label>
      <input type="text" id="cTitle" placeholder="예) 토요일 행사 일정 변경">
    </div>
    <div class="field">
      <label>내용</label>
      <textarea id="cBody" placeholder="상세 내용을 입력하세요…"></textarea>
    </div>
    <div class="field row">
      <div>
        <label>중요도</label>
        <select id="cPriority">
          <option value="normal">일반</option>
          <option value="important">⚠ 중요</option>
          <option value="urgent">🚨 긴급</option>
        </select>
      </div>
      <div>
        <label>대상</label>
        <select id="cAudience">
          <option value="all">전 직원</option>
          <option value="managers">매니저만</option>
          <option value="MIAMI">마이애미</option>
          <option value="PEMBROKE_PINES">펨브로크 파인즈</option>
          <option value="HOLLYWOOD">할리우드</option>
          <option value="CORAL_SPRINGS">코럴 스프링스</option>
          <option value="LASOLAS">라스올라스</option>
          <option value="WEST_PALM">웨스트 팜 비치</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>사진 첨부 (선택)</label>
      <div class="attach-row">
        <button type="button" onclick="document.getElementById('cCam').click()">📷 카메라</button>
        <button type="button" onclick="document.getElementById('cFile').click()">📎 갤러리</button>
        <span id="cAttachCount" style="color:#9ca3af;font-size:.82em"></span>
      </div>
      <input type="file" id="cCam" accept="image/*" capture="environment" onchange="handleFiles(event)">
      <input type="file" id="cFile" accept="image/*" multiple onchange="handleFiles(event)">
      <div class="previews" id="cPreviews"></div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeOverlay('composeOverlay')">취소</button>
      <button class="btn" id="cPostBtn" onclick="postUpdate()">📤 게시</button>
    </div>
  </div>
</div>

<!-- ME MODAL (same identity as chat) -->
<div class="overlay" id="meOverlay">
  <div class="modal">
    <h3>본인 이름 선택</h3>
    <div style="font-size:.85em;color:#6b7280;margin-bottom:12px">매니저는 공지를 작성할 수 있습니다.</div>
    <div class="field">
      <label>지점</label>
      <select id="meBranch" onchange="renderMeNames()"></select>
    </div>
    <div class="field">
      <label>이름</label>
      <select id="meName_select"></select>
    </div>
    <div class="field">
      <label>또는 직접 입력 (스케줄에 없는 경우)</label>
      <input type="text" id="meCustom" placeholder="이름을 입력">
    </div>
    <div id="meRoleHint" style="font-size:.82em;color:#1a5c3a;font-weight:600;margin-bottom:8px"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeOverlay('meOverlay')">취소</button>
      <button class="btn" onclick="saveMe()">저장</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" alt="">
</div>

<script>
const FB_DB_URL = 'https://kimchi-mart-order-default-rtdb.firebaseio.com';
const FB_STORAGE_BUCKET = 'kimchi-mart-order.firebasestorage.app';
const FB_STORAGE_URL = `https://firebasestorage.googleapis.com/v0/b/${FB_STORAGE_BUCKET}/o`;

const BRANCHES = [
  { id:'MIAMI',         ko:'마이애미' },
  { id:'PEMBROKE_PINES',ko:'펨브로크 파인즈' },
  { id:'HOLLYWOOD',     ko:'할리우드' },
  { id:'CORAL_SPRINGS', ko:'코럴 스프링스' },
  { id:'LASOLAS',       ko:'라스올라스' },
  { id:'WEST_PALM',     ko:'웨스트 팜 비치' },
];
const BRANCH_BY_ID = Object.fromEntries(BRANCHES.map(b => [b.id, b]));
const COLORS = ['#22c55e','#3b82f6','#a855f7','#ec4899','#f59e0b','#ef4444','#06b6d4','#0ea5e9','#84cc16','#f97316'];
const MANAGER_TOKENS = ['MANAGER','SUPERVISOR','OFFICE','OWNER','매니저','점장','감독'];

function colorFor(name){
  let h=0; for (let i=0;i<name.length;i++) h = (h*31+name.charCodeAt(i))|0;
  return COLORS[Math.abs(h)%COLORS.length];
}
function initialsOf(name){ return (name||'?').split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase(); }
function isManagerRole(role){
  if (!role) return false;
  const r = role.toUpperCase();
  return MANAGER_TOKENS.some(t => r.includes(t));
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTimeAgo(ts){
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return '방금';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  const d = new Date(ts);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}
function showToast(msg, color){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color || '#1a5c3a'; t.style.display = 'block';
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => { t.style.display = 'none'; }, 2200);
}
function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }
function openLightbox(url){ document.getElementById('lightboxImg').src = url; document.getElementById('lightbox').classList.add('show'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); }));

// ===== ME (shared identity with chat.html) =====
let me = (function(){ try { return JSON.parse(localStorage.getItem('chat.me') || 'null'); } catch(e){ return null; } })();

function ensureMe(){
  if (!me || !me.name) { openMeModal(); return false; }
  return true;
}
function openMeModal(){
  document.getElementById('meBranch').innerHTML = BRANCHES.map(b => `<option value="${b.id}" ${me?.branch===b.id?'selected':''}>${b.ko}</option>`).join('');
  document.getElementById('meCustom').value = me?.name || '';
  renderMeNames();
  document.getElementById('meOverlay').classList.add('show');
}
function renderMeNames(){
  const branchId = document.getElementById('meBranch').value;
  let employees = [];
  try {
    const data = JSON.parse(localStorage.getItem('shifts.' + branchId) || 'null');
    if (data && data.employees) employees = data.employees;
  } catch(e){}
  if (employees.length === 0) {
    fetch(`${FB_DB_URL}/schedules/${branchId}.json`).then(r => r.json()).then(d => {
      if (d?.employees) renderMeNamesList(d.employees);
    });
  }
  renderMeNamesList(employees);
}
function renderMeNamesList(employees){
  const sel = document.getElementById('meName_select');
  sel.innerHTML = '<option value="">— 직접 입력 —</option>' +
    employees.map(e => `<option value="${e.name}" data-role="${e.role||''}" ${me?.name===e.name?'selected':''}>${e.name} (${e.role||''})${isManagerRole(e.role)?' 👔':''}</option>`).join('');
  sel.onchange = () => {
    if (sel.value) document.getElementById('meCustom').value = sel.value;
    const role = sel.options[sel.selectedIndex]?.dataset.role || '';
    document.getElementById('meRoleHint').textContent = role
      ? (isManagerRole(role) ? `👔 매니저 권한 (역할: ${role}) — 공지 작성 가능` : `일반 직원 (역할: ${role}) — 읽기만 가능`)
      : '';
  };
}
function saveMe(){
  const branchId = document.getElementById('meBranch').value;
  const sel = document.getElementById('meName_select');
  const fromSel = sel.value;
  const selRole = sel.options[sel.selectedIndex]?.dataset.role || '';
  const fromCustom = document.getElementById('meCustom').value.trim();
  const name = fromCustom || fromSel;
  if (!name) { showToast('이름을 입력하세요', '#dc2626'); return; }
  let role = selRole;
  if (!role && fromCustom) {
    try {
      const data = JSON.parse(localStorage.getItem('shifts.' + branchId) || 'null');
      const emp = data?.employees?.find(e => e.name.toLowerCase() === fromCustom.toLowerCase());
      role = emp?.role || '';
    } catch(e){}
  }
  me = { name, branch: branchId, color: colorFor(name), role, isManager: isManagerRole(role) };
  localStorage.setItem('chat.me', JSON.stringify(me));
  refreshMePill();
  refreshComposeFab();
  closeOverlay('meOverlay');
  renderFeed();   // re-render with new "mine" + audience filter
}
function refreshMePill(){
  if (!me) return;
  document.getElementById('meAv').textContent = initialsOf(me.name);
  document.getElementById('meAv').style.background = me.color || '#1a5c3a';
  const branch = BRANCH_BY_ID[me.branch];
  document.getElementById('meName').textContent = (me.isManager ? '👔 ' : '') + me.name + (branch ? ' · ' + branch.ko : '');
}
function refreshComposeFab(){
  const fab = document.getElementById('composeFab');
  fab.classList.toggle('show', !!me?.isManager);
}

// ===== UPDATES STATE =====
let UPDATES = [];
let ATTACH = [];   // composer attachments [{dataUrl, blob}]
let FILTER = localStorage.getItem('updates.filter') || 'all';   // all | unread | mine

function renderFilters(){
  const cont = document.getElementById('filters');
  const opts = [
    { id:'all',     label:'📋 전체' },
    { id:'urgent',  label:'🚨 긴급/중요' },
    { id:'mybranch',label:`🏢 우리 지점` },
    me?.isManager ? { id:'mine', label:'✏ 내가 쓴 글' } : null,
  ].filter(Boolean);
  cont.innerHTML = opts.map(o => `<div class="chip ${o.id===FILTER?'active':''}" onclick="setFilter('${o.id}')">${o.label}</div>`).join('');
}
function setFilter(id){ FILTER = id; localStorage.setItem('updates.filter', id); renderFilters(); renderFeed(); }

function visibleUpdates(){
  return UPDATES.filter(u => {
    // audience visibility
    if (u.audience === 'managers' && !me?.isManager) return false;
    if (u.audience !== 'all' && u.audience !== 'managers' && u.audience !== me?.branch && u.audience) {
      // branch-specific update — not for me
      if (!me?.isManager) return false;   // managers can see all branch-specific updates
    }
    // filter chip
    if (FILTER === 'urgent') return u.priority === 'urgent' || u.priority === 'important';
    if (FILTER === 'mybranch') return u.audience === me?.branch || u.audience === 'all';
    if (FILTER === 'mine') return u.author === me?.name && u.authorBranch === me?.branch;
    return true;
  }).sort((a,b) => (b.ts||0) - (a.ts||0));
}

function renderFeed(){
  renderFilters();
  const feed = document.getElementById('feed');
  const list = visibleUpdates();
  if (list.length === 0) {
    feed.innerHTML = `<div class="empty"><div class="ico">📣</div><div>아직 공지가 없습니다.</div>${me?.isManager ? '<div style="font-size:.85em;margin-top:6px">우측 하단 ＋ 버튼으로 새 공지를 작성하세요.</div>' : ''}</div>`;
    return;
  }
  feed.innerHTML = list.map(u => renderCard(u)).join('');
}
function renderCard(u){
  const mine = me && u.author === me.name && u.authorBranch === me.branch;
  const branch = BRANCH_BY_ID[u.authorBranch];
  const branchTxt = branch ? branch.ko : '';
  const audLabel = u.audience === 'all' ? '전 직원'
    : u.audience === 'managers' ? '매니저만'
    : (BRANCH_BY_ID[u.audience]?.ko || u.audience);
  const audClass = u.audience === 'managers' ? 'audience managers' : 'audience';
  const photosHtml = (u.photos && u.photos.length)
    ? `<div class="photos n${Math.min(u.photos.length,6)}">${u.photos.map(url => `<img src="${url}" onclick="openLightbox('${url}')">`).join('')}</div>`
    : '';
  const priClass = u.priority === 'urgent' ? 'priority-urgent' : u.priority === 'important' ? 'priority-important' : '';
  const priBadge = u.priority === 'urgent' ? '<span class="badge urgent">🚨 긴급</span>'
                  : u.priority === 'important' ? '<span class="badge important">⚠ 중요</span>'
                  : '';
  const color = u.color || colorFor(u.author || '?');
  return `<div class="update ${priClass} ${mine?'mine':''}" data-id="${u.id}">
    <div class="meta">
      <div class="av" style="background:${color}">${initialsOf(u.author)}</div>
      <div class="who">
        <div class="nm">${u.isManager?'👔 ':''}${escapeHtml(u.author||'?')}${branchTxt?' · '+escapeHtml(branchTxt):''}</div>
        <div class="sub">${fmtTimeAgo(u.ts || 0)}</div>
      </div>
      <div class="badges">${priBadge}<span class="badge ${audClass}">📍 ${escapeHtml(audLabel)}</span></div>
    </div>
    ${u.title ? `<h3>${escapeHtml(u.title)}</h3>` : ''}
    ${u.body ? `<div class="body">${escapeHtml(u.body)}</div>` : ''}
    ${photosHtml}
    ${mine ? `<div class="actions"><button class="del" onclick="deleteUpdate('${u.id}')">🗑 삭제</button></div>` : ''}
  </div>`;
}

// ===== COMPOSER =====
function openComposeModal(){
  if (!ensureMe()) return;
  if (!me.isManager) { showToast('매니저만 공지를 작성할 수 있습니다', '#dc2626'); return; }
  document.getElementById('cTitle').value = '';
  document.getElementById('cBody').value = '';
  document.getElementById('cPriority').value = 'normal';
  document.getElementById('cAudience').value = 'all';
  ATTACH = [];
  document.getElementById('cPreviews').innerHTML = '';
  document.getElementById('cAttachCount').textContent = '';
  document.getElementById('composeOverlay').classList.add('show');
}

async function handleFiles(ev){
  const files = Array.from(ev.target.files || []);
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    const compressed = await compressImage(f);
    ATTACH.push(compressed);
  }
  ev.target.value = '';
  renderPreviews();
}
function renderPreviews(){
  const wrap = document.getElementById('cPreviews');
  wrap.innerHTML = ATTACH.map((a, i) => `<div class="pv"><img src="${a.dataUrl}"><button class="x" onclick="removeAttach(${i})">✕</button></div>`).join('');
  document.getElementById('cAttachCount').textContent = ATTACH.length ? `${ATTACH.length}장 첨부됨` : '';
}
function removeAttach(i){ ATTACH.splice(i,1); renderPreviews(); }
function compressImage(file){
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const max = 1280;
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > max || h > max) { const r = Math.min(max/w, max/h); w = Math.round(w*r); h = Math.round(h*r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      c.toBlob(blob => {
        const reader = new FileReader();
        reader.onload = () => resolve({ dataUrl: reader.result, blob });
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.78);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve({ dataUrl:'', blob:null }); };
    img.src = url;
  });
}
async function uploadPhoto(blob, updateId, idx){
  const path = `updates/${updateId}/${idx}.jpg`;
  const r = await fetch(`${FB_STORAGE_URL}?name=${encodeURIComponent(path)}&uploadType=media`, {
    method:'POST', headers:{'Content-Type':'image/jpeg'}, body: blob
  });
  if (!r.ok) throw new Error('upload failed: ' + r.status);
  const meta = await r.json();
  return `${FB_STORAGE_URL}/${encodeURIComponent(meta.name)}?alt=media&token=${meta.downloadTokens || ''}`;
}

async function postUpdate(){
  if (!me?.isManager) return;
  const title = document.getElementById('cTitle').value.trim();
  const body = document.getElementById('cBody').value.trim();
  if (!title && !body && ATTACH.length === 0) { showToast('제목 / 내용 / 사진 중 하나는 입력하세요', '#dc2626'); return; }
  const priority = document.getElementById('cPriority').value;
  const audience = document.getElementById('cAudience').value;
  const ts = Date.now();
  const id = 'u' + ts + Math.floor(Math.random()*900);
  const btn = document.getElementById('cPostBtn');
  btn.disabled = true; btn.textContent = '게시 중...';

  try {
    const photos = [];
    for (let i = 0; i < ATTACH.length; i++) {
      const url = await uploadPhoto(ATTACH[i].blob, id, i);
      photos.push(url);
      btn.textContent = `사진 ${i+1}/${ATTACH.length}...`;
    }
    const payload = {
      author: me.name, authorBranch: me.branch, color: me.color, isManager: true,
      title, body, priority, audience, photos, ts
    };
    await fetch(`${FB_DB_URL}/updates/${id}.json`, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    closeOverlay('composeOverlay');
    showToast('✓ 공지가 게시되었습니다');
  } catch (e) {
    showToast('게시 실패: ' + e.message, '#dc2626');
  } finally {
    btn.disabled = false; btn.textContent = '📤 게시';
  }
}

let __delArmed = {};
async function deleteUpdate(id){
  const u = UPDATES.find(x => x.id === id);
  if (!u || !me || u.author !== me.name || u.authorBranch !== me.branch) return;
  if (!__delArmed[id]) {
    __delArmed[id] = true;
    const card = document.querySelector(`.update[data-id="${id}"] .del`);
    if (card) { card.textContent = '한 번 더 클릭'; card.style.background = '#7f1d1d'; }
    setTimeout(() => {
      __delArmed[id] = false;
      const c = document.querySelector(`.update[data-id="${id}"] .del`);
      if (c) { c.textContent = '🗑 삭제'; c.style.background = ''; }
    }, 4000);
    return;
  }
  // delete photos
  if (u.photos) for (let i = 0; i < u.photos.length; i++) {
    fetch(`${FB_STORAGE_URL}/${encodeURIComponent('updates/'+id+'/'+i+'.jpg')}`, {method:'DELETE'}).catch(()=>{});
  }
  await fetch(`${FB_DB_URL}/updates/${id}.json`, {method:'DELETE'});
  showToast('🗑 공지 삭제됨', '#dc2626');
}

// ===== SUBSCRIBE =====
function applyUpdates(d){
  if (!d) { UPDATES = []; renderFeed(); return; }
  UPDATES = Object.entries(d).map(([id, u]) => Object.assign({id}, u));
  renderFeed();
}
function fetchRest(){
  fetch(`${FB_DB_URL}/updates.json?t=${Date.now()}`, {cache:'no-store'})
    .then(r => r.json())
    .then(applyUpdates)
    .catch(()=>{});
}
function subscribe(){
  fetchRest();
  if (!window.__fb) return;
  const { db, ref, onValue } = window.__fb;
  onValue(ref(db, 'updates'), snap => applyUpdates(snap.val()));
}
window.addEventListener('fb-ready', subscribe);
setTimeout(() => { if (!window.__fb) fetchRest(); }, 2500);

// expose
Object.assign(window, {
  openMeModal, saveMe, renderMeNames, openComposeModal, postUpdate,
  handleFiles, removeAttach, deleteUpdate, openLightbox, closeOverlay, setFilter,
});

// ===== INIT =====
if (me) { refreshMePill(); refreshComposeFab(); } else { openMeModal(); }
fetchRest();
renderFeed();
</script>
