<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',Arial,sans-serif;background:#f5f5f5;min-height:100vh;padding-bottom:40px}
.header{background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;text-align:center;padding:22px 20px;position:relative}
.header h1{font-size:1.5em}
.header p{opacity:.85;margin-top:4px;font-size:.9em}
.back{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.45);color:#fff;text-decoration:none;border-radius:10px;padding:6px 14px;font-size:.85em;font-weight:700}
.back:hover{background:rgba(255,255,255,.3)}
.apps{max-width:520px;margin:20px auto;padding:0 15px}
.section-note{font-size:.85em;color:#666;text-align:center;margin:14px 4px 18px}
.app-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;align-items:center;gap:15px;text-decoration:none;color:#333;transition:.2s}
.app-card:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.app-icon{width:62px;height:62px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.app-info{flex:1}
.app-name{font-size:1.1em;font-weight:700}
.app-desc{font-size:.8em;color:#888;margin-top:4px}
.app-badge{background:#e8f5e9;color:#2e7d32;padding:4px 10px;border-radius:8px;font-size:.7em;font-weight:600}
.empty-note{text-align:center;color:#999;font-size:.85em;padding:30px 10px;border:1.5px dashed #ccc;border-radius:12px;margin-top:10px}
</style>
</head>
