<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벤더 오더 센타 - KIMCHI MART</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',Arial,sans-serif;background:#f5f5f5;min-height:100vh;padding-bottom:40px}
.header{background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;text-align:center;padding:22px 20px;position:relative}
.header h1{font-size:1.5em}
.header p{opacity:.85;margin-top:4px;font-size:.9em}
.back{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.45);color:#fff;text-decoration:none;border-radius:10px;padding:6px 14px;font-size:.85em;font-weight:700}
.back:hover{background:rgba(255,255,255,.3)}
.apps{max-width:520px;margin:20px auto;padding:0 15px}
.section-note{font-size:.85em;color:#666;text-align:center;margin:14px 4px 18px}
.app-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;align-items:center;gap:15px;text-decoration:none;color:#333;transition:.2s}
.app-card:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(0,0,0,.15)}
.app-icon{width:62px;height:62px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.app-info{flex:1}
.app-name{font-size:1.1em;font-weight:700}
.app-desc{font-size:.8em;color:#888;margin-top:4px}
.app-badge{background:#e8f5e9;color:#2e7d32;padding:4px 10px;border-radius:8px;font-size:.7em;font-weight:600}
.empty-note{text-align:center;color:#999;font-size:.85em;padding:30px 10px;border:1.5px dashed #ccc;border-radius:12px;margin-top:10px}
</style>
</head>
<body>

<div class="header">
<a class="back" href="./apps.html" data-t="back">← 앱 목록</a>
<h1 data-t="title">🏪 벤더 오더 센타</h1>
<p data-t="subtitle">공급사별 주문 앱 모음</p>
<div style="display:flex;justify-content:center;gap:6px;margin-top:10px">
<button onclick="setLang('ko')" style="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:8px;padding:3px 12px;font-size:.8em;font-weight:700;cursor:pointer">KO</button>
<button onclick="setLang('en')" style="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:8px;padding:3px 12px;font-size:.8em;font-weight:700;cursor:pointer">EN</button>
<button onclick="setLang('es')" style="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:8px;padding:3px 12px;font-size:.8em;font-weight:700;cursor:pointer">ES</button>
</div>
</div>

<div class="apps">

<div class="section-note" data-t="pick">원하는 공급사를 선택해서 주문을 시작하세요.</div>

<!-- Wang Global (한미 + CJ) -->
<a class="app-card" href="https://specialmasterdj-sketch.github.io/kimchi-mart-order/hanmi.html" target="_blank">
<div class="app-icon" style="background:#E8F5E9">🥬</div>
<div class="app-info">
<div class="app-name" data-t="wg_name">Wang Global 오더</div>
<div class="app-desc" data-t="wg_desc">한미 + CJ 통합 카다록 · 1,997 제품 (사진 포함)</div>
</div>
<span class="app-badge">ORDER</span>
</a>

<!-- Wismettac standalone catalog -->
<a class="app-card" href="https://specialmasterdj-sketch.github.io/kimchi-mart-order/wismettac.html" target="_blank">
<div class="app-icon" style="background:#FFEBEE">🍣</div>
<div class="app-info">
<div class="app-name" data-t="wis_name">Wismettac 오더</div>
<div class="app-desc" data-t="wis_desc">위스메탁 Orlando 카다록 · 1,311 제품</div>
</div>
<span class="app-badge">ORDER</span>
</a>

<div class="section-note" style="margin-top:24px;font-size:.78em;color:#999" data-t="more">추가 벤더 앱은 여기에 계속 쌓입니다.</div>

</div>

<script>
const T = {
  ko: { back: '← 앱 목록', title: '🏪 벤더 오더 센타', subtitle: '공급사별 주문 앱 모음',
        pick: '원하는 공급사를 선택해서 주문을 시작하세요.',
        wg_name: 'Wang Global 오더', wg_desc: '한미 + CJ 통합 카다록 · 1,997 제품 (사진 포함)',
        wis_name: 'Wismettac 오더',  wis_desc: '위스메탁 Orlando 카다록 · 1,311 제품',
        more: '추가 벤더 앱은 여기에 계속 쌓입니다.' },
  en: { back: '← Apps', title: '🏪 Vendor Order Center', subtitle: 'Per-supplier order apps',
        pick: 'Pick a supplier to start an order.',
        wg_name: 'Wang Global Order', wg_desc: 'Hanmi + CJ combined catalog · 1,997 products (with photos)',
        wis_name: 'Wismettac Order',   wis_desc: 'Wismettac Orlando catalog · 1,311 products',
        more: 'More vendor apps will be added here.' },
  es: { back: '← Apps', title: '🏪 Centro de Pedidos', subtitle: 'Apps de pedido por proveedor',
        pick: 'Elija un proveedor para iniciar un pedido.',
        wg_name: 'Pedido Wang Global', wg_desc: 'Catálogo combinado Hanmi + CJ · 1,997 productos (con fotos)',
        wis_name: 'Pedido Wismettac',  wis_desc: 'Catálogo de Wismettac Orlando · 1,311 productos',
        more: 'Se agregarán más apps de proveedores aquí.' }
};
function setLang(l){
  try { localStorage.setItem('kimchi_lang', l); } catch(e){}
  const tr = T[l] || T.ko;
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (tr[key]) el.textContent = tr[key];
  });
  document.documentElement.lang = l;
}
try { setLang(localStorage.getItem('kimchi_lang') || 'ko'); } catch(e){ setLang('ko'); }
</script>

</body>
</html>
