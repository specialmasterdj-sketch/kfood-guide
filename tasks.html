<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',Arial,sans-serif;background:#f4f6f9;color:#1f2937;min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer}

.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1a5c3a,#2e7d32);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}
.topbar h1{font-size:1.1em;font-weight:800;color:#1a5c3a}
.topbar .spacer{flex:1}
.me-pill{background:#f0fdf4;color:#1a5c3a;border:1px solid #bbf7d0;border-radius:20px;padding:6px 12px;font-size:.82em;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer}
.me-pill .av{width:22px;height:22px;border-radius:50%;background:#1a5c3a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:700}

.lang-toggle{display:inline-flex;background:#f3f4f6;border-radius:14px;padding:2px;gap:0;margin-right:6px}
.lang-toggle button{background:transparent;border:0;padding:4px 10px;border-radius:12px;font-size:.74em;font-weight:700;color:#6b7280;cursor:pointer}
.lang-toggle button.active{background:#1a5c3a;color:#fff}

.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 16px;gap:4px;position:sticky;top:51px;z-index:49}
.tabs button{background:transparent;border:0;padding:12px 16px;font-size:.92em;font-weight:600;color:#6b7280;border-bottom:3px solid transparent;cursor:pointer}
.tabs button.active{color:#1a5c3a;border-bottom-color:#1a5c3a}
.tabs button .count{background:#fee2e2;color:#991b1b;border-radius:10px;font-size:.7em;padding:1px 7px;margin-left:5px;font-weight:700}

.page{padding:16px;max-width:1100px;margin:0 auto;display:none}
.page.active{display:block}

/* === EMPLOYEE VIEW === */
.summary-bar{background:#fff;border-radius:14px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:18px}
.summary-bar .big{font-size:1.8em;font-weight:900;color:#1a5c3a}
.summary-bar .lbl{flex:1;font-size:.85em;color:#6b7280}
.summary-bar .lbl b{display:block;font-size:1em;color:#1f2937;margin-bottom:2px}
.prog-mini{flex:1;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;min-width:140px}
.prog-mini .fill{height:100%;background:linear-gradient(90deg,#22c55e,#1a5c3a);transition:width .3s}

.task-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;border-left:4px solid #e5e7eb}
.task-card.in_progress{border-left-color:#f59e0b;background:#fffbeb}
.task-card.completed{border-left-color:#22c55e;opacity:.85}
.task-card.delayed{border-left-color:#dc2626;background:#fef2f2}
.task-row{display:flex;align-items:center;gap:10px}
.task-name{flex:1;font-size:1em;font-weight:700}
.task-card.completed .task-name{text-decoration:line-through;color:#9ca3af}
.task-meta{font-size:.78em;color:#6b7280;margin-top:4px;display:flex;flex-wrap:wrap;gap:10px}
.task-meta .deadline{color:#1e40af;font-weight:600}
.task-meta .photo-req{background:#fef3c7;color:#92400e;font-weight:700;padding:2px 7px;border-radius:6px;font-size:.74em}
.task-meta .from{color:#1a5c3a;font-weight:600}
.task-card.delayed .task-meta .deadline{color:#dc2626}
.task-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.btn{background:#1a5c3a;color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:.85em;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn.sec{background:#fff;color:#1a5c3a;border:1px solid #1a5c3a}
.btn.warn{background:#f59e0b}
.btn.danger{background:#dc2626}
.btn.gray{background:#9ca3af;cursor:default}
.btn:disabled{background:#9ca3af;cursor:not-allowed}
.task-photos{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.task-photos img{width:54px;height:54px;border-radius:8px;object-fit:cover;cursor:pointer}
.task-memo{background:#f9fafb;border-radius:8px;padding:8px 12px;font-size:.85em;color:#374151;margin-top:8px;line-height:1.4}
.task-memo b{color:#1a5c3a}
.task-elapsed{position:absolute;top:14px;right:14px;background:#dbeafe;color:#1e40af;font-size:.74em;font-weight:700;padding:3px 8px;border-radius:6px}

/* === MANAGER VIEW === */
.mgr-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mgr-toolbar .filter{flex:1;display:flex;gap:6px;flex-wrap:wrap}
.mgr-toolbar .chip{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:5px 12px;font-size:.78em;font-weight:600;color:#6b7280;cursor:pointer}
.mgr-toolbar .chip.active{background:#1a5c3a;color:#fff;border-color:#1a5c3a}
.mgr-table{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mgr-table table{width:100%;border-collapse:collapse}
.mgr-table th{background:#f9fafb;padding:10px 12px;text-align:left;font-size:.74em;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb}
.mgr-table td{padding:12px;font-size:.88em;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.mgr-table tr:hover{background:#f9fafb;cursor:pointer}
.mgr-table tr.delayed td{background:#fef2f2}
.mgr-table .av{width:28px;height:28px;border-radius:50%;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.72em;margin-right:6px;vertical-align:middle}
.mgr-table .status{display:inline-block;padding:3px 9px;border-radius:6px;font-size:.74em;font-weight:700}
.mgr-table .status.pending{background:#f3f4f6;color:#6b7280}
.mgr-table .status.in_progress{background:#fef3c7;color:#92400e}
.mgr-table .status.completed{background:#dcfce7;color:#15803d}
.mgr-table .status.delayed{background:#fee2e2;color:#991b1b}
.mgr-table .thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;cursor:pointer;margin-right:4px}

/* === MODAL === */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:14px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;max-width:480px;width:100%;max-height:92vh;overflow:auto}
.modal h3{font-size:1.15em;font-weight:800;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.78em;font-weight:600;color:#374151;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:9px 12px;font-size:.92em;font-family:inherit;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1a5c3a}
.field textarea{resize:none;min-height:70px}
.field .hint{font-size:.74em;color:#9ca3af;margin-top:3px}
.field .check{display:flex;align-items:center;gap:8px;background:#fef3c7;border:1px solid #fde68a;padding:10px 12px;border-radius:8px}
.field .check label{margin:0;color:#92400e;font-size:.85em;cursor:pointer}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}

/* === REPORT VIEW === */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi .v{font-size:2em;font-weight:900;color:#1a5c3a;line-height:1.1}
.kpi .l{font-size:.78em;color:#6b7280;margin-top:4px}
.kpi.warn .v{color:#dc2626}
.kpi.ok .v{color:#15803d}
.report-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px}
.report-card h3{font-size:1em;font-weight:800;margin-bottom:12px;color:#1a5c3a}
.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.bar-row .nm{flex:0 0 130px;font-size:.85em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .bar{flex:1;height:14px;background:#f3f4f6;border-radius:7px;overflow:hidden;position:relative}
.bar-row .bar .f{height:100%;background:linear-gradient(90deg,#22c55e,#1a5c3a);border-radius:7px}
.bar-row .v{font-size:.78em;font-weight:700;color:#374151;min-width:60px;text-align:right}

.empty{text-align:center;padding:40px 20px;color:#9ca3af;font-size:.9em;background:#fff;border-radius:14px}

/* === CLOCK-IN CARD === */
.clockin-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;margin-bottom:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.clockin-card .ic{font-size:1.4em;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f3f4f6;flex-shrink:0}
.clockin-card .body{flex:1;min-width:0;word-break:keep-all}
.clockin-card b{display:block;font-size:1em;font-weight:700}
.clockin-card .sub{display:block;font-size:.78em;color:#6b7280;margin-top:2px}
.clockin-card.ok{background:#f0fdf4}
.clockin-card.ok .ic{background:#22c55e;color:#fff}
.clockin-card.ok b{color:#15803d}
.clockin-card.ready .ic{background:#1a5c3a;color:#fff}
.clockin-card.far{background:#fef3c7}
.clockin-card.far .ic{background:#f59e0b;color:#fff}
.clockin-card.far b{color:#92400e}
.clockin-card.warn{background:#fef2f2}
.clockin-card.warn .ic{background:#dc2626;color:#fff}
.clockin-card.warn b{color:#991b1b}

/* === NOTIFY BANNER + TOAST === */
.notify-banner{background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:.86em;color:#92400e}
.notify-banner.ok{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}
.notify-banner button{background:#1a5c3a;color:#fff;border:0;border-radius:6px;padding:6px 12px;font-size:.86em;font-weight:600;cursor:pointer}
.notify-banner .x{background:transparent;color:inherit;font-size:1.2em;padding:0 4px}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column-reverse;gap:8px;max-width:340px}
.toast{background:#1a5c3a;color:#fff;padding:12px 16px;border-radius:10px;font-size:.88em;box-shadow:0 4px 18px rgba(0,0,0,.18);animation:slideIn .25s;cursor:pointer}
.toast b{display:block;margin-bottom:2px;font-weight:700}
.toast.delayed{background:#dc2626}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

@media(max-width:760px){
  .mgr-table{overflow-x:auto}
  .mgr-table table{min-width:680px}
  .summary-bar{flex-wrap:wrap}
}
</style>
</head>
<body>

<div class="topbar">
  <button onclick="if(history.length>1)history.back();else location.href='./apps.html'" style="background:transparent;border:0;font-size:1.4em;color:#6b7280">←</button>
  <button onclick="location.href='./apps.html'" title="홈" style="background:transparent;border:0;font-size:1.2em;color:#6b7280">🏠</button>
  <div class="logo">K</div>
  <h1>업무 지시</h1>
  <div class="spacer"></div>
  <div class="lang-toggle" id="langToggle">
    <button data-l="ko" onclick="setLang('ko')">KO</button>
    <button data-l="en" onclick="setLang('en')">EN</button>
    <button data-l="es" onclick="setLang('es')">ES</button>
  </div>
  <div class="me-pill" id="mePill" onclick="goSetName()">
    <div class="av" id="meAv">?</div>
    <span id="meName">이름 등록</span>
  </div>
</div>

<div class="tabs">
  <button class="active" data-tab="emp" onclick="switchTab('emp')">📋 내 업무 <span class="count" id="empCount" style="display:none">0</span></button>
  <button data-tab="mgr" onclick="switchTab('mgr')" id="mgrTabBtn" style="display:none">👁 매니저 뷰</button>
  <button data-tab="rep" onclick="switchTab('rep')" id="repTabBtn" style="display:none">📊 리포트</button>
</div>

<!-- NOTIFY BANNER -->
<div id="notifyBanner" style="padding:0 16px;max-width:1100px;margin:14px auto 0;display:none">
  <div class="notify-banner" id="notifyBannerInner">
    <span style="font-size:1.2em">🔔</span>
    <span style="flex:1" id="notifyBannerText">새 업무 지시를 즉시 받으려면 알림을 켜세요.</span>
    <button onclick="enableNotify()">알림 켜기</button>
    <button class="x" onclick="dismissNotifyBanner()">×</button>
  </div>
</div>
<div class="toast-wrap" id="toastWrap"></div>

<!-- ============= EMPLOYEE VIEW ============= -->
<div class="page active" id="page-emp">
  <div id="clockInCard" class="clockin-card warn" style="display:none">
    <span class="ic">📡</span>
    <div class="body"><b>위치 정보 받는 중...</b><span class="sub">위치 권한 허용 필요</span></div>
  </div>
  <div class="summary-bar">
    <div class="big" id="empSumBig">0/0</div>
    <div class="lbl"><b id="empSumDate">오늘</b><span id="empSumSub">완료한 업무 / 전체</span></div>
    <div class="prog-mini"><div class="fill" id="empSumFill" style="width:0%"></div></div>
  </div>
  <div id="empList"></div>
</div>

<!-- ============= MANAGER VIEW ============= -->
<div class="page" id="page-mgr">
  <div class="mgr-toolbar">
    <div class="filter">
      <button class="chip active" data-f="all" onclick="setMgrFilter('all',this)">전체</button>
      <button class="chip" data-f="pending" onclick="setMgrFilter('pending',this)">대기</button>
      <button class="chip" data-f="in_progress" onclick="setMgrFilter('in_progress',this)">진행중</button>
      <button class="chip" data-f="completed" onclick="setMgrFilter('completed',this)">완료</button>
      <button class="chip" data-f="delayed" onclick="setMgrFilter('delayed',this)">⚠️ 지연</button>
    </div>
    <button class="btn" onclick="openAssignModal()">+ 새 지시</button>
  </div>
  <div class="mgr-table">
    <table><thead><tr>
      <th>담당자</th><th>업무명</th><th>데드라인</th><th>상태</th><th>완료 시간</th><th>증빙</th>
    </tr></thead><tbody id="mgrRows"></tbody></table>
  </div>
</div>

<!-- ============= REPORT VIEW ============= -->
<div class="page" id="page-rep">
  <div class="kpi-row">
    <div class="kpi ok"><div class="v" id="kpiCompletion">0%</div><div class="l">이번주 완료율</div></div>
    <div class="kpi warn"><div class="v" id="kpiMissed">0</div><div class="l">누락 업무</div></div>
    <div class="kpi"><div class="v" id="kpiAvgTime">0분</div><div class="l">평균 소요시간</div></div>
    <div class="kpi"><div class="v" id="kpiPeak">-</div><div class="l">피크 타임</div></div>
  </div>
  <div class="report-card">
    <h3>👥 직원별 평균 소요시간</h3>
    <div id="repByEmp"><div class="empty" style="background:transparent">데이터 없음 — 업무 완료 기록이 쌓이면 표시됩니다</div></div>
  </div>
  <div class="report-card">
    <h3>⏰ 시간대별 완료율 (피크 타임)</h3>
    <div id="repByHour"><div class="empty" style="background:transparent">데이터 없음</div></div>
  </div>
</div>

<!-- ASSIGN MODAL -->
<div class="overlay" id="assignOv">
  <div class="modal">
    <h3>📨 새 업무 지시</h3>
    <div class="field"><label>업무명</label><input type="text" id="aName" placeholder="예: 신선식품 코너 온도 체크"></div>
    <div class="field"><label>담당자</label>
      <select id="aTo"><option value="">— 직원 선택 —</option></select>
      <div class="hint">또는 본 지점 전체에 배정 가능</div>
    </div>
    <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label>데드라인</label><input type="time" id="aDeadline" value="11:00"></div>
      <div><label>카테고리</label><select id="aCat"><option value="온도 체크">온도 체크</option><option value="유통기한">유통기한</option><option value="진열">진열/보충</option><option value="청소">청소</option><option value="현금">현금/카운트</option><option value="기타">기타</option></select></div>
    </div>
    <div class="field check"><input type="checkbox" id="aPhoto" checked><label for="aPhoto">📷 완료 사진 필수 (원격 검수)</label></div>
    <div class="field"><label>추가 메모 (선택)</label><textarea id="aNote" placeholder="예: 우유 코너 우선 점검"></textarea></div>
    <div class="modal-actions">
      <button class="btn sec" onclick="closeOv('assignOv')">취소</button>
      <button class="btn" onclick="sendAssign()">📨 보내기</button>
    </div>
  </div>
</div>

<!-- COMPLETE MODAL -->
<div class="overlay" id="doneOv">
  <div class="modal">
    <h3>✅ 업무 완료 보고</h3>
    <div id="doneTaskInfo" style="background:#f0fdf4;border-radius:10px;padding:12px;margin-bottom:14px;font-size:.88em;font-weight:600;color:#15803d"></div>
    <div class="field" id="donePhotoField">
      <label>📷 완료 사진 (필수)</label>
      <input type="file" id="donePhoto" accept="image/*" capture="environment" multiple>
      <div id="donePreviews" style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap"></div>
      <div class="hint">사진 1장 이상 첨부해야 완료 가능</div>
    </div>
    <div class="field"><label>특이사항 메모 (선택)</label><textarea id="doneMemo" placeholder="예: 서울우유 2.3L 재고 3개 남음 → 추가 발주 필요"></textarea></div>
    <div class="modal-actions">
      <button class="btn sec" onclick="closeOv('doneOv')">취소</button>
      <button class="btn" id="doneBtn" onclick="finishTask()">✅ 완료 보고</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="overlay" id="lbOv" onclick="closeOv('lbOv')" style="background:rgba(0,0,0,.92)">
  <img id="lbImg" style="max-width:96vw;max-height:92vh;border-radius:10px">
</div>

<script>
// ================= STATE =================
const FB_DB_URL = 'https://kimchi-mart-order-default-rtdb.firebaseio.com';
const FB_STORAGE_BUCKET = 'kimchi-mart-order.firebasestorage.app';
const FB_STORAGE_URL = `https://firebasestorage.googleapis.com/v0/b/${FB_STORAGE_BUCKET}/o`;

// ================= LANGUAGE / TRANSLATION =================
const LANG_KEY = 'tasks.lang';
function detectLang(){
  // Honor any of the lang keys other pages set
  for (const k of [LANG_KEY, 'kimchi_lang', 'hub.lang']) {
    const v = localStorage.getItem(k);

// In-memory translation cache so we don't refetch the same string
const TR_CACHE = new Map();
async function translate(text, target) {
  if (!text) return '';
  if (!target || target === 'auto') return text;
  const key = target + '|' + text;
  if (TR_CACHE.has(key)) return TR_CACHE.get(key);
  try {
    const u = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
    const r = await fetch(u);
    if (!r.ok) throw 0;
    const j = await r.json();
    const out = (j && j[0]) ? j[0].map(seg => seg[0]).join('') : text;
    TR_CACHE.set(key, out);
    return out;
  } catch(e) { return text; }
}
async function translateMulti(text) {
  if (!text) return null;
  const [en, es, ko] = await Promise.all([
    translate(text, 'en'),
    translate(text, 'es'),
    translate(text, 'ko'),
  ]);
  return { ko, en, es };
}
// pick the right language out of a translations object, falling back gracefully
function pickLang(tr, fallback){
  if (!tr) return fallback || '';
  return tr[LANG] || tr.ko || tr.en || tr.es || fallback || '';
}
// Translate an existing task on the fly if it has no translations bundle yet
async function backfillTranslate(t) {
  if (t.nameTr || !t.name) return;
  const tr = await translateMulti(t.name);
  if (tr) t.nameTr = tr;
  if (t.memo && !t.memoTr) t.memoTr = await translateMulti(t.memo);
  if (t.note && !t.noteTr) t.noteTr = await translateMulti(t.note);
  renderAll && renderAll();
}

const BRANCH_GEO_PATH = 'tasks/_config/branchGeo';
const ATTEND_BASE = 'attendance';
const DEFAULT_RADIUS_M = 80;
let BRANCH_GEO = {};
let MY_LOCATION = null;
let TODAY_CLOCKIN = null;
let geoTickHandle = null;

function distMeters(lat1, lng1, lat2, lng2){
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function locateMe(){
  return new Promise((res, rej) => {
    if (!navigator.geolocation) return rej(new Error('위치 기능 미지원'));
    navigator.geolocation.getCurrentPosition(
      p => res({lat:p.coords.latitude, lng:p.coords.longitude, acc:p.coords.accuracy}),
      e => rej(new Error(e.message || '위치 권한 거부됨')),
      {enableHighAccuracy:true, timeout:12000, maximumAge:30000}
    );
  });
}
function slug(s){ return String(s||'').replace(/[^a-zA-Z0-9가-힣]/g,'_'); }
function branchKo(id){ return (BRANCHES.find(b=>b.id===id)||{}).ko || id; }
function subscribeBranchGeo(){
  if (!window.__fb) return;
  const r = window.__fb.ref(window.__fb.db, BRANCH_GEO_PATH);
  window.__fb.onValue(r, snap => { BRANCH_GEO = snap.val() || {}; renderClockIn(); });
}
let attendUnsub = null;
function subscribeMyAttendance(){
  if (!me || !window.__fb) return;
  if (attendUnsub) { try{attendUnsub();}catch(e){} attendUnsub=null; }
  const path = ATTEND_BASE+'/'+me.branch+'/'+todayStr()+'/'+slug(me.name);
  const r = window.__fb.ref(window.__fb.db, path);
  attendUnsub = window.__fb.onValue(r, snap => { TODAY_CLOCKIN = snap.val(); renderClockIn(); });
}
async function tickLocation(){
  if (!me) return;
  try { MY_LOCATION = await locateMe(); }
  catch(e) { MY_LOCATION = {error:e.message}; }
  renderClockIn();
}
function renderClockIn(){
  const el = document.getElementById('clockInCard');
  if (!me || !el) { if(el) el.style.display='none'; return; }
  el.style.display = '';
  const branchGeo = BRANCH_GEO[me.branch];
  const radius = (branchGeo && branchGeo.radius) || DEFAULT_RADIUS_M;
  const canReg = isManager(me.role) || isOwner();
  const br = escHtml(branchKo(me.branch));
  // 1) Already clocked in today
  if (TODAY_CLOCKIN && TODAY_CLOCKIN.clockIn) {
    const tm = fmtTime(TODAY_CLOCKIN.clockIn);
    el.className = 'clockin-card ok';
    el.innerHTML = `<span class="ic">✓</span><div class="body"><b>${t('clockedIn',{t:tm})}</b><span class="sub">${t('arrivalVerif',{br})}${TODAY_CLOCKIN.distance!=null?' · '+TODAY_CLOCKIN.distance+'m':''}</span></div>`;
    return;
  }
  // 2) Branch coords not registered
  if (!branchGeo || !branchGeo.lat) {
    el.className = 'clockin-card warn';
    el.innerHTML = `<span class="ic">📍</span><div class="body"><b>${t('geoUnreg')}</b><span class="sub">${br} — ${canReg?t('geoUnregMgr'):t('geoUnregEmp')}</span></div>` + (canReg?`<button class="btn warn" onclick="registerBranchGeo()">${t('registerHere')}</button>`:'');
    return;
  }
  // 3) Need user location
  if (!MY_LOCATION || MY_LOCATION.error) {
    el.className = 'clockin-card warn';
    el.innerHTML = `<span class="ic">📡</span><div class="body"><b>${t('geoLoading')}</b><span class="sub">${MY_LOCATION&&MY_LOCATION.error?escHtml(MY_LOCATION.error):t('geoNeedPerm')}</span></div><button class="btn sec" onclick="tickLocation()">${t('retry')}</button>`;
    return;
  }
  // 4) Compute distance
  const d = distMeters(MY_LOCATION.lat, MY_LOCATION.lng, branchGeo.lat, branchGeo.lng);
  const canClock = d <= radius;
  el.className = 'clockin-card ' + (canClock?'ready':'far');
  const headline = canClock ? t('arrived') : t('awayFrom', { d: Math.round(d) });
  const sub = br + ' · ' + t('accuracy', { a: Math.round(MY_LOCATION.acc) }) + (canClock ? '' : t('withinRadius', { r: radius }));
  el.innerHTML = `<span class="ic">${canClock?'📍':'🚶'}</span>`+
    `<div class="body"><b>${headline}</b><span class="sub">${sub}</span></div>`+
    `<button class="btn ${canClock?'':'gray'}" ${canClock?'':'disabled'} onclick="clockIn()">${canClock?t('clockInBtn'):t('waitBtn')}</button>`;
}
async function clockIn(){
  if (!me || !MY_LOCATION || !MY_LOCATION.lat) return;
  const branchGeo = BRANCH_GEO[me.branch];
  if (!branchGeo) { alert('매장 좌표 미등록'); return; }
  const radius = branchGeo.radius || DEFAULT_RADIUS_M;
  const d = distMeters(MY_LOCATION.lat, MY_LOCATION.lng, branchGeo.lat, branchGeo.lng);
  if (d > radius) { alert('매장에서 너무 멉니다 ('+Math.round(d)+'m)'); return; }
  const path = ATTEND_BASE+'/'+me.branch+'/'+todayStr()+'/'+slug(me.name);
  await window.__fb.set(window.__fb.ref(window.__fb.db, path), {
    name: me.name, role: me.role || null, clockIn: Date.now(),
    lat: MY_LOCATION.lat, lng: MY_LOCATION.lng, accuracy: Math.round(MY_LOCATION.acc), distance: Math.round(d)
  });
  showToast('✅ 출근 완료', fmtTime(Date.now()) + ' · ' + Math.round(d) + 'm 거리에서 인증');
}
async function registerBranchGeo(){
  if (!me) return;
  if (!isManager(me.role) && !isOwner()) { alert('매니저+ 만 등록 가능'); return; }
  if (!confirm('현재 위치를 ['+branchKo(me.branch)+'] 매장 좌표로 등록할까요?\n반경 '+DEFAULT_RADIUS_M+'m 기본 (직원이 이 반경 안일 때만 출근 가능)')) return;
  let loc;
  try { loc = await locateMe(); } catch(e) { alert('위치 못 가져옴: '+e.message); return; }
  const path = BRANCH_GEO_PATH+'/'+me.branch;
  await window.__fb.update(window.__fb.ref(window.__fb.db, path), {
    lat: loc.lat, lng: loc.lng, radius: DEFAULT_RADIUS_M,
    registeredBy: me.name, registeredAt: Date.now()
  });
  showToast('✓ 매장 좌표 등록 완료', branchKo(me.branch) + ' · 반경 '+DEFAULT_RADIUS_M+'m');
}

function notifyPermission(){ return notifySupported() ? Notification.permission : 'unsupported'; }
function refreshNotifyBanner(){
  const banner = document.getElementById('notifyBanner');
  const txt = document.getElementById('notifyBannerText');
  const inner = document.getElementById('notifyBannerInner');
  if (!notifySupported()) { banner.style.display='none'; return; }
  if (sessionStorage.getItem('tasks.notifyDismissed') === '1') { banner.style.display='none'; return; }
  if (Notification.permission === 'granted') { banner.style.display='none'; return; }
  if (Notification.permission === 'denied') {
    inner.classList.remove('ok');
    txt.textContent = '⚠️ 알림이 차단되어 있습니다. 브라우저 설정에서 허용해 주세요.';
    banner.querySelector('button:not(.x)').style.display = 'none';
    banner.style.display = '';
    return;
  }
  banner.style.display = '';
}
async function enableNotify(){
  if (!notifySupported()) { alert('이 브라우저는 알림을 지원하지 않습니다.'); return; }
  try {
    const p = await Notification.requestPermission();
    if (p === 'granted') {
      new Notification('🔔 알림 활성화 완료', { body: '새 업무 지시 도착 시 즉시 알려 드립니다.' });
    }
  } catch(e){}
  refreshNotifyBanner();
}
function dismissNotifyBanner(){ sessionStorage.setItem('tasks.notifyDismissed','1'); document.getElementById('notifyBanner').style.display='none'; }
function showToast(title, body, opts){
  opts = opts || {};
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast' + (opts.delayed ? ' delayed' : '');
  el.innerHTML = '<b>'+escHtml(title)+'</b>'+escHtml(body||'');
  el.onclick = () => { el.remove(); if (opts.onClick) opts.onClick(); };
  wrap.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 6000);
}
function fireNotify(title, body, opts){
  opts = opts || {};
  showToast(title, body, opts);
  if (notifySupported() && Notification.permission === 'granted') {
    try {
      const n = new Notification(title, { body: body || '', tag: opts.tag || 'kimchi-task', renotify: true, icon: 'pwa-assets/icon-192.png' });
      if (opts.onClick) n.onclick = () => { window.focus(); opts.onClick(); n.close(); };
    } catch(e){}
  }
}
function detectNewTasks(){
  if (!SEEN_INIT) {
    TASKS.forEach(t => SEEN_IDS.add(t.branchId+'/'+t.id));
    SEEN_INIT = true;
    return;
  }
  const showMgr = isManager(me && me.role) || isOwner();
  TASKS.forEach(t => {
    const key = t.branchId+'/'+t.id;
    if (SEEN_IDS.has(key)) return;
    SEEN_IDS.add(key);
    // New task — decide whom to notify
    if (isAssignedToMe(t)) {
      const dl = t.deadline ? ' · 데드라인 '+t.deadline : '';
      fireNotify('📨 새 업무 지시', t.name + dl + (t.from ? '\n— '+t.from : ''), { tag: 'task-'+t.id, onClick: () => switchTab('emp') });
    } else if (showMgr) {
      // Manager sees all assigns (informational, lower noise — only OS toast, no system notif by default)
      showToast('📋 업무 등록', t.name + ' → ' + (t.assignedTo === '*' ? '전체' : (t.assignedTo || t.assignedToRole || '')));
    }
  });
}
// Detect newly delayed tasks for managers (per minute tick)
let LAST_DELAYED = new Set();
function detectDelays(){
  if (!me) return;
  const showMgr = isManager(me.role) || isOwner();
  if (!showMgr) return;
  const nowDelayed = new Set();
  TASKS.forEach(t => { if (computeStatus(t) === 'delayed' && !t.completedAt) nowDelayed.add(t.branchId+'/'+t.id); });
  nowDelayed.forEach(k => {
    if (!LAST_DELAYED.has(k)) {
      const t = TASKS.find(x => x.branchId+'/'+x.id === k);
      if (t) fireNotify('⚠️ 업무 지연 발생', (t.assignedTo || '담당자') + ' — ' + t.name + ' (데드라인 '+(t.deadline||'-')+')', { tag: 'delay-'+t.id, delayed: true, onClick: () => switchTab('mgr') });
    }
  });
  LAST_DELAYED = nowDelayed;
}

// ================= COMPUTE STATUS =================
function computeStatus(t){
  if (t.completedAt) return 'completed';
  const now = Date.now();
  const today = todayStr();
  const dl = t.deadline ? new Date(today + 'T' + t.deadline + ':00').getTime() : null;
  if (t.startedAt) return (dl && now > dl) ? 'delayed' : 'in_progress';
  if (dl && now > dl) return 'delayed';
  return 'pending';
}

function renderEmp(){
  const list = document.getElementById('empList');
  const my = TASKS.filter(t => isAssignedToMe(t));
  my.sort((a,b) => (a.deadline||'99:99').localeCompare(b.deadline||'99:99'));
  const total = my.length;
  const done = my.filter(t => t.completedAt).length;
  document.getElementById('empSumBig').textContent = done + ' / ' + total;
  const localeMap = { ko:'ko-KR', en:'en-US', es:'es-ES' };
  document.getElementById('empSumDate').textContent = new Date().toLocaleDateString(localeMap[LANG]||'ko-KR',{month:'long',day:'numeric',weekday:'long'});
  document.getElementById('empSumSub').textContent = total === 0 ? t('noTasksToday') : t('doneTotal');
  document.getElementById('empSumFill').style.width = total ? (done/total*100) + '%' : '0%';
  const cnt = total - done;
  const cntEl = document.getElementById('empCount');
  if (cnt > 0) { cntEl.style.display=''; cntEl.textContent = cnt; } else cntEl.style.display='none';
  if (total === 0) { list.innerHTML = `<div class="empty">${t('emptyEmp')}</div>`; return; }
  list.innerHTML = my.map(renderTaskCard).join('');
}
function isAssignedToMe(t){
  if (!me) return false;
  if (t.assignedToId && t.assignedToId === me.name) return true;
  if (t.assignedTo && t.assignedTo.toLowerCase() === (me.name||'').toLowerCase()) return true;
  if (t.assignedTo === '*') return true; // all
  if (t.assignedToRole && me.role && t.assignedToRole.toLowerCase() === me.role.toLowerCase()) return true;
  return false;
}
function renderTaskCard(t){
  const status = computeStatus(t);
  const elapsed = (t.startedAt && !t.completedAt) ? Math.floor((Date.now()-t.startedAt)/60000) : null;
  // Backfill translations in background for tasks that were created before translation existed
  if (t.name && !t.nameTr) backfillTranslate(t);
  const dispName = pickLang(t.nameTr, t.name);
  const dispMemo = t.memo ? pickLang(t.memoTr, t.memo) : '';
  const dispNote = t.note ? pickLang(t.noteTr, t.note) : '';
  const labels = {
    deadline: { ko:'데드라인', en:'Due', es:'Plazo' },
    photoReq: { ko:'사진 필수', en:'Photo required', es:'Foto requerida' },
    start:    { ko:'▶ 시작', en:'▶ Start', es:'▶ Iniciar' },
    quick:    { ko:'⚡ 바로 완료', en:'⚡ Quick done', es:'⚡ Listo rápido' },
    report:   { ko:'✅ 완료 보고', en:'✅ Report done', es:'✅ Reportar' },
    done:     { ko:'✓ 완료', en:'✓ Done', es:'✓ Hecho' },
    inProg:   { ko:'분 진행', en:' min', es:' min' },
    memo:     { ko:'📝 메모', en:'📝 Note', es:'📝 Nota' },
  };
  let actions = '';
  if (status === 'completed') actions = `<span class="btn gray">${labels.done[LANG]} ${fmtTime(t.completedAt)}</span>`;
  else if (status === 'in_progress' || (t.startedAt && !t.completedAt)) actions = `<button class="btn" onclick="openDoneModal('${t.id}','${t.branchId}')">${labels.report[LANG]}</button>`;
  else actions = `<button class="btn warn" onclick="startTask('${t.id}','${t.branchId}')">${labels.start[LANG]}</button> <button class="btn sec" onclick="openDoneModal('${t.id}','${t.branchId}')">${labels.quick[LANG]}</button>`;
  const photosHtml = (t.photos && t.photos.length) ? `<div class="task-photos">${t.photos.map((u,i)=>`<img src="${u}" onclick="openLb('${u}')">`).join('')}</div>` : '';
  const memoHtml = dispMemo ? `<div class="task-memo"><b>${labels.memo[LANG]}:</b> ${escHtml(dispMemo)}</div>` : '';
  const noteHtml = dispNote ? `<div class="task-memo" style="background:#fef3c7;color:#92400e">${escHtml(dispNote)}</div>` : '';
  return `<div class="task-card ${status}">
    ${elapsed!==null?`<div class="task-elapsed">⏱ ${elapsed}${labels.inProg[LANG]}</div>`:''}
    <div class="task-row">
      <div class="task-name">${escHtml(dispName)}</div>
    </div>
    <div class="task-meta">
      ${t.deadline?`<span class="deadline">⏰ ${labels.deadline[LANG]} ${t.deadline}</span>`:''}
      ${t.requirePhoto?`<span class="photo-req">📷 ${labels.photoReq[LANG]}</span>`:''}
      ${t.from?`<span class="from">👤 ${escHtml(t.from)}</span>`:''}
      ${t.category?`<span>· ${escHtml(t.category)}</span>`:''}
    </div>
    ${noteHtml}
    ${memoHtml}
    ${photosHtml}
    <div class="task-actions">${actions}</div>
  </div>`;
}

function openDoneModal(id, branchId){

document.getElementById('donePhoto').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  const btn = document.getElementById('doneBtn');
  for (const f of files) {
    if (btn) { btn.disabled = true; btn.textContent = '사진 처리 중…'; }
    const compressed = await compressImage(f);
    const url = await readDataUrl(compressed);
    DONE_PHOTOS.push({ file: compressed, dataUrl: url });
  }
  if (btn) { btn.disabled = false; btn.textContent = '✅ 완료 보고'; }
  renderDonePreviews();
});
function readDataUrl(f){ return new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(f); }); }
async function compressImage(file, maxSide = 1280, quality = 0.82) {
  if (!file || !file.type || !file.type.startsWith('image/')) return file;
  try {
    const url = URL.createObjectURL(file);
    const img = await new Promise((res, rej) => { const im = new Image(); im.onload = () => res(im); im.onerror = rej; im.src = url; });
    URL.revokeObjectURL(url);
    let { width, height } = img;
    if (width <= maxSide && height <= maxSide && file.size < 400 * 1024) return file; // small enough — skip
    const r = Math.min(maxSide / width, maxSide / height, 1);
    const w = Math.round(width * r), h = Math.round(height * r);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const blob = await new Promise(res => canvas.toBlob(b => res(b), 'image/jpeg', quality));
    if (!blob || blob.size > file.size) return file;
    return new File([blob], (file.name || 'photo').replace(/\.\w+$/, '') + '.jpg', { type: 'image/jpeg', lastModified: Date.now() });
  } catch(e) { console.warn('compress fail', e); return file; }
}
function renderDonePreviews(){
  document.getElementById('donePreviews').innerHTML = DONE_PHOTOS.map((p,i) =>
    `<div style="position:relative"><img src="${p.dataUrl}" style="width:60px;height:60px;border-radius:8px;object-fit:cover"><button onclick="DONE_PHOTOS.splice(${i},1);renderDonePreviews()" style="position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;border:0;border-radius:50%;width:20px;height:20px;font-size:.7em;cursor:pointer">×</button></div>`
  ).join('');
}
window.DONE_PHOTOS = DONE_PHOTOS;
async function finishTask(){
  if (!CURRENT_TASK) return;
  if (CURRENT_TASK.requirePhoto && DONE_PHOTOS.length === 0) { alert('📷 사진 1장 이상 첨부해 주세요.'); return; }
  const btn = document.getElementById('doneBtn');
  btn.disabled = true; btn.textContent = '업로드 중…';
  try {
    const photoUrls = [];
    for (const p of DONE_PHOTOS) {
      const path = 'tasks/'+CURRENT_TASK.branchId+'/'+todayStr()+'/'+CURRENT_TASK.id+'/'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.jpg';
      let url = null;
      // 1) Try Firebase Storage REST upload
      try {
        const r = await fetch(FB_STORAGE_URL+'?name='+encodeURIComponent(path)+'&uploadType=media', {
          method: 'POST',
          headers: { 'Content-Type': 'image/jpeg' },
          body: p.file
        });
        if (r.ok) {
          const meta = await r.json();
          url = FB_STORAGE_URL+'/'+encodeURIComponent(meta.name)+'?alt=media&token='+(meta.downloadTokens||'');
        }
      } catch(e) { /* fall through */ }
      // 2) Fallback: re-compress smaller and embed as base64 dataURL in RTDB
      if (!url) {
        const small = await compressImage(p.file, 720, 0.55);
        url = await readDataUrl(small);
      }
      photoUrls.push(url);
    }
    const memoText = document.getElementById('doneMemo').value.trim();
    const memoTr = memoText ? await translateMulti(memoText) : null;
    const path = 'tasks/'+CURRENT_TASK.branchId+'/'+todayStr()+'/'+CURRENT_TASK.id;
    const upd = { completedAt: Date.now(), completedBy: me.name, photos: [...(CURRENT_TASK.photos||[]), ...photoUrls], memo: memoText, memoTr: memoTr };
    if (!CURRENT_TASK.startedAt) upd.startedAt = Date.now();
    await window.__fb.update(window.__fb.ref(window.__fb.db, path), upd);
    closeOv('doneOv');
  } catch(e) { alert('실패: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '✅ 완료 보고'; DONE_PHOTOS = []; }
}

// ================= MANAGER VIEW =================
function setMgrFilter(f, btn){
  MGR_FILTER = f;
  document.querySelectorAll('.mgr-toolbar .chip').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderMgr();
}
function renderMgr(){
  const tbody = document.getElementById('mgrRows');
  let rows = TASKS.slice();
  rows.forEach(t => t._status = computeStatus(t));
  if (MGR_FILTER !== 'all') rows = rows.filter(t => t._status === MGR_FILTER);
  // Sort: delayed first, then in_progress, then pending, then completed
  const order = { delayed:0, in_progress:1, pending:2, completed:3 };
  rows.sort((a,b) => (order[a._status]-order[b._status]) || (a.deadline||'99').localeCompare(b.deadline||'99'));
  if (rows.length === 0) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:30px;color:#9ca3af">${t('emptyMgr')}</td></tr>`; return; }
  const stLabels = {
    pending:    { ko:'대기',   en:'Pending',     es:'Pendiente' },
    in_progress:{ ko:'진행중', en:'In progress', es:'En curso' },
    completed:  { ko:'완료',   en:'Done',        es:'Hecho' },
    delayed:    { ko:'지연',   en:'Delayed',     es:'Retrasado' },
  };
  const startLabel = { ko:'시작 ', en:'Started ', es:'Iniciado ' };
  tbody.innerHTML = rows.map(t => {
    if (t.name && !t.nameTr) backfillTranslate(t);
    const dispName = pickLang(t.nameTr, t.name);
    const dispMemo = t.memo ? pickLang(t.memoTr, t.memo) : '';
    const who = t.assignedTo || (t.assignedToRole ? '['+t.assignedToRole+']' : '전체');
    const av = `<span class="av" style="background:${colorFor(who)}">${initials(who)}</span>`;
    const branch = isOwner() && t.branchName ? ` <span style="font-size:.72em;color:#9ca3af">(${t.branchName})</span>` : '';
    const stLabel = stLabels[t._status][LANG];
    const memo = dispMemo ? `<div style="font-size:.74em;color:#6b7280;margin-top:3px">📝 ${escHtml(dispMemo)}</div>` : '';
    const photos = (t.photos||[]).slice(0,3).map(u => `<img class="thumb" src="${u}" onclick="openLb('${u}')">`).join('');
    return `<tr class="${t._status}">
      <td>${av}<span style="font-size:.85em">${escHtml(who)}</span>${branch}</td>
      <td><div style="font-weight:600">${escHtml(dispName)}</div>${memo}</td>
      <td><span style="font-size:.85em;${t._status==='delayed'?'color:#dc2626;font-weight:700':''}">${t.deadline||'-'}</span></td>
      <td><span class="status ${t._status}">${stLabel}</span></td>
      <td><span style="font-size:.85em">${t.completedAt ? fmtTime(t.completedAt) : (t.startedAt ? startLabel[LANG]+fmtTime(t.startedAt) : '-')}</span></td>
      <td>${photos || '<span style="color:#d1d5db">-</span>'}</td>
    </tr>`;
  }).join('');
}

// ================= REPORT =================
function renderReport(){
  const all = TASKS;
  const total = all.length;
  const done = all.filter(t => t.completedAt).length;
  const delayed = all.filter(t => computeStatus(t) === 'delayed').length;
  const completion = total ? Math.round(done/total*100) : 0;
  document.getElementById('kpiCompletion').textContent = completion + '%';
  document.getElementById('kpiMissed').textContent = delayed;
  // Avg duration
  const completedWithTimes = all.filter(t => t.startedAt && t.completedAt);
  const avgMin = completedWithTimes.length ? Math.round(completedWithTimes.reduce((s,t) => s + (t.completedAt - t.startedAt)/60000, 0) / completedWithTimes.length) : 0;
  document.getElementById('kpiAvgTime').textContent = avgMin + '분';
  // Peak hour
  const byHour = {};
  all.forEach(t => { if(t.completedAt){ const h=new Date(t.completedAt).getHours(); byHour[h]=(byHour[h]||0)+1; } });
  let peakH = '-', peakV = 0;
  Object.entries(byHour).forEach(([h,v]) => { if (v > peakV) { peakV = v; peakH = h+':00'; } });
  document.getElementById('kpiPeak').textContent = peakH;
  // Per-employee avg
  const byEmp = {};
  completedWithTimes.forEach(t => {
    const who = t.completedBy || t.assignedTo || '?';
    (byEmp[who] = byEmp[who] || []).push((t.completedAt - t.startedAt)/60000);
  });
  const empRows = Object.entries(byEmp).map(([n,arr]) => ({ n, avg: Math.round(arr.reduce((a,b)=>a+b,0)/arr.length), cnt: arr.length }));
  empRows.sort((a,b) => a.avg - b.avg);
  const maxAvg = empRows.length ? Math.max(...empRows.map(r => r.avg)) : 1;
  document.getElementById('repByEmp').innerHTML = empRows.length === 0
    ? '<div class="empty" style="background:transparent">데이터 없음 — 업무 완료 기록이 쌓이면 표시됩니다</div>'
    : empRows.map(r => `<div class="bar-row"><div class="nm">${escHtml(r.n)}</div><div class="bar"><div class="f" style="width:${r.avg/maxAvg*100}%"></div></div><div class="v">${r.avg}분 (${r.cnt}건)</div></div>`).join('');
  // By hour
  const hours = Object.entries(byHour).sort((a,b) => +a[0] - +b[0]);
  const maxH = hours.length ? Math.max(...hours.map(h => h[1])) : 1;
  document.getElementById('repByHour').innerHTML = hours.length === 0
    ? '<div class="empty" style="background:transparent">데이터 없음</div>'
    : hours.map(([h,v]) => `<div class="bar-row"><div class="nm">${h}:00</div><div class="bar"><div class="f" style="width:${v/maxH*100}%"></div></div><div class="v">${v}건</div></div>`).join('');
}

async function sendAssign(){
  const name = document.getElementById('aName').value.trim();
  const to = document.getElementById('aTo').value;
  const deadline = document.getElementById('aDeadline').value;
  const cat = document.getElementById('aCat').value;
  const photo = document.getElementById('aPhoto').checked;
  const note = document.getElementById('aNote').value.trim();
  if (!name) { alert('업무명을 입력하세요.'); return; }
  if (!to) { alert('담당자를 선택하세요.'); return; }
  const sendBtn = document.querySelector('#assignOv .btn:not(.sec)');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '번역 중…'; }
  // Translate name + note into ko/en/es so any employee sees it in their language
  const [nameTr, noteTr] = await Promise.all([
    translateMulti(name),
    note ? translateMulti(note) : Promise.resolve(null),
  ]);
  const path = 'tasks/'+me.branch+'/'+todayStr();
  const r = window.__fb.push(window.__fb.ref(window.__fb.db, path));
  await window.__fb.set(r, {
    name, nameTr,
    deadline, category: cat, requirePhoto: photo,
    assignedTo: to === '*' ? '*' : to,
    from: me.name, fromRole: me.role,
    createdAt: Date.now(),
    note: note || null,
    noteTr: noteTr || null,
  });
  if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '📨 보내기'; }
  closeOv('assignOv');
  alert('✅ 업무 지시 전송 완료\n· 담당자 화면에 즉시 표시됩니다 (KO/EN/ES 자동 번역)');
}

// ================= UTIL =================
function closeOv(id){ document.getElementById(id).classList.remove('show'); }
function openLb(url){ document.getElementById('lbImg').src = url; document.getElementById('lbOv').classList.add('show'); }
function renderAll(){ renderEmp(); renderMgr(); if (document.getElementById('page-rep').classList.contains('active')) renderReport(); }
window.addEventListener('storage', e => { if (e.key === 'chat.me') { refreshMe(); subscribeTasks(); subscribeMyAttendance(); tickLocation(); } });
window.addEventListener('fb-ready', () => subscribeTasks());

// expose
window.switchTab = switchTab;
window.openAssignModal = openAssignModal;
window.sendAssign = sendAssign;
window.startTask = startTask;
window.openDoneModal = openDoneModal;
window.finishTask = finishTask;
window.closeOv = closeOv;
window.openLb = openLb;
window.setMgrFilter = setMgrFilter;
window.goSetName = goSetName;
window.enableNotify = enableNotify;
window.dismissNotifyBanner = dismissNotifyBanner;
window.tickLocation = tickLocation;
window.clockIn = clockIn;
window.registerBranchGeo = registerBranchGeo;
window.setLang = setLang;

// Init
refreshMe();
refreshLangToggle();
refreshStaticI18n();
refreshNotifyBanner();
// React to language changes from another tab/page (apps.html toggle, etc.)
window.addEventListener('storage', e => {
  if (['tasks.lang','kimchi_lang','hub.lang'].includes(e.key) && e.newValue && ['ko','en','es'].includes(e.newValue) && e.newValue !== LANG) {
    LANG = e.newValue;
    refreshLangToggle();
    refreshStaticI18n();
    if (typeof renderAll === 'function') renderAll();
  }
});
function bootFb(){
  subscribeTasks();
  subscribeBranchGeo();
  subscribeMyAttendance();
  tickLocation();
}
if (window.__fb) bootFb();
window.addEventListener('fb-ready', bootFb);
// Live tick — recompute statuses every minute (for delay detection + notification)
setInterval(() => {
  renderEmp();
  if (document.getElementById('page-mgr').classList.contains('active')) renderMgr();
  detectDelays();
}, 60000);
// Refresh location every 2 minutes (only if signed in and not yet clocked in)
setInterval(() => { if (me && !(TODAY_CLOCKIN && TODAY_CLOCKIN.clockIn)) tickLocation(); }, 120000);
</script>
